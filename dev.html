<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>DepenDrap Developer IDE</title>
<link rel="icon" href="assets/System/favicon.png">
<link rel="stylesheet" href="css/style.css">
<script src="js/ui/responsiveScale.js"></script>
<style>
:root {
  --ide-bg: #0a0f19;
  --ide-bg-soft: #111a2a;
  --ide-bg-panel: #131f33;
  --ide-bg-panel-2: #182742;
  --ide-border: #2d4368;
  --ide-border-soft: #20314d;
  --ide-text: #d9e6ff;
  --ide-text-dim: #8ea3c6;
  --ide-accent: #49b3ff;
  --ide-accent-2: #3de6b8;
  --ide-danger: #ff6f91;
}
* { box-sizing: border-box; }
body {
  margin: 0;
  min-height: 100vh;
  background:
    radial-gradient(1200px 600px at -10% -10%, #214272 0%, transparent 60%),
    radial-gradient(1000px 500px at 110% 120%, #18335c 0%, transparent 62%),
    linear-gradient(180deg, #08101d 0%, #0a0f19 100%);
  color: var(--ide-text);
  font-family: "Segoe UI", "Noto Sans JP", sans-serif;
  word-break: keep-all;
  overflow-wrap: normal;
}
.ideTopBar {
  height: 54px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 14px;
  background: rgba(6, 11, 20, 0.92);
  border-bottom: 1px solid var(--ide-border-soft);
  position: sticky;
  top: 0;
  z-index: 30;
  backdrop-filter: blur(8px);
}
.ideBrand {
  font-weight: 700;
  letter-spacing: 0.04em;
}
.ideTopBar .btn {
  border: 1px solid var(--ide-border);
  background: var(--ide-bg-panel);
  color: var(--ide-text);
  border-radius: 8px;
  padding: 6px 10px;
  cursor: pointer;
  white-space: nowrap;
}
#appRoot {
  min-height: calc(100vh - 54px);
}
.devHome {
  max-width: 960px;
  margin: 24px auto;
  padding: 20px;
  display: grid;
  gap: 16px;
}
.devCard {
  background: rgba(19, 31, 51, 0.9);
  border: 1px solid var(--ide-border);
  border-radius: 14px;
  padding: 16px;
}
.devCard h2, .devCard h3 { margin: 0 0 8px; }
.devCard p { margin: 0; color: var(--ide-text-dim); }
.actionRow {
  margin-top: 14px;
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}
.actionRow button {
  border: 1px solid var(--ide-border);
  background: linear-gradient(180deg, #1f3f69, #173355);
  color: #ecf4ff;
  border-radius: 10px;
  padding: 9px 14px;
  cursor: pointer;
  white-space: nowrap;
}

.cardIde {
  height: calc(100dvh - 54px);
  min-height: 700px;
  padding: 10px;
  display: grid;
  grid-template-rows: minmax(420px, 1fr) minmax(160px, 0.4fr);
  gap: 8px;
}
.cardIdeMain {
  min-height: 0;
  display: grid;
  grid-template-columns: minmax(280px, 22vw) minmax(460px, 1fr) minmax(320px, 26vw);
  gap: 8px;
}
.idePanel {
  min-height: 0;
  background: linear-gradient(180deg, rgba(18,31,51,0.96), rgba(14,24,40,0.96));
  border: 1px solid var(--ide-border);
  border-radius: 10px;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}
.idePanelHeader {
  height: 34px;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
  padding: 0 10px;
  background: rgba(11, 19, 33, 0.95);
  border-bottom: 1px solid var(--ide-border-soft);
  font-size: 12px;
  color: #b9ceef;
  overflow: hidden;
}
.idePanelHeader > span {
  min-width: 0;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.idePanelHeader > div {
  display: flex;
  gap: 6px;
  align-items: center;
  min-width: 0;
  overflow-x: auto;
  scrollbar-width: thin;
}
.idePanelBody {
  min-height: 0;
  flex: 1;
  overflow: auto;
  padding: 8px;
}
.idePanelBody.tight { padding: 0; }

.rightStack {
  min-height: 0;
  display: grid;
  grid-template-rows: 1fr;
  gap: 8px;
}
.cardVisualPanel .idePanelBody {
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: visible;
}
.cardVisualPanel {
  overflow: visible;
}
.cardMenuWrap {
  position: relative;
  z-index: 120;
}
.cardMenuPopup {
  position: absolute;
  top: calc(100% + 6px);
  right: 0;
  z-index: 130;
  width: 160px;
  display: grid;
  gap: 6px;
  padding: 8px;
  border-radius: 10px;
  border: 1px solid #375b89;
  background: #10233d;
  box-shadow: 0 12px 22px rgba(0,0,0,0.35);
}
.cardVisualCanvas {
  width: 100%;
  height: 100%;
  min-height: 260px;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
}
.cardMetaBadge {
  position: absolute;
  top: 4px;
  left: 6px;
  font-size: 12px;
  color: #c7ddff;
  background: rgba(12, 22, 36, 0.72);
  border: 1px solid rgba(106, 146, 202, 0.5);
  border-radius: 8px;
  padding: 3px 8px;
  max-width: calc(100% - 12px);
  overflow: hidden;
  white-space: nowrap;
  text-overflow: ellipsis;
}
.cardVisualFrame {
  width: min(100%, 300px);
  aspect-ratio: 3 / 4.2;
  --card-scale: 1;
  position: relative;
  border-radius: 16px;
  background: linear-gradient(180deg, #1f3659, #172842);
  box-shadow: 0 12px 24px rgba(0,0,0,0.45);
  overflow: hidden;
}
.cardVisualImage {
  position: absolute;
  inset: 0;
  z-index: 1;
  display: flex;
  align-items: center;
  justify-content: center;
}
.cardVisualImage img {
  width: 100%;
  height: 100%;
  object-fit: contain;
  object-position: center;
}
.cardVisualBorder {
  position: absolute;
  inset: 0;
  z-index: 2;
  border: 2px solid #4c87d0;
  border-radius: 16px;
  pointer-events: auto;
}
.cardVisualType {
  position: absolute;
  z-index: 3;
  top: calc(6px * var(--card-scale));
  right: calc(8px * var(--card-scale));
  font-size: clamp(10px, calc(11px * var(--card-scale)), 15px);
  color: #e4f0ff;
  padding: calc(2px * var(--card-scale)) calc(8px * var(--card-scale));
  border-radius: 999px;
  border: 1px solid rgba(194,218,255,0.5);
  background: rgba(10,20,35,0.62);
}
.cardVisualAttack {
  position: absolute;
  z-index: 3;
  top: calc(26px * var(--card-scale));
  left: calc(8px * var(--card-scale));
  font-size: clamp(13px, calc(16px * var(--card-scale)), 24px);
  font-weight: 700;
  color: #fff4c7;
  text-shadow: 0 1px 4px rgba(0,0,0,0.7);
}
.cardVisualAttr {
  position: absolute;
  z-index: 3;
  top: calc(58px * var(--card-scale));
  left: calc(8px * var(--card-scale));
  width: clamp(18px, calc(24px * var(--card-scale)), 34px);
  height: clamp(18px, calc(24px * var(--card-scale)), 34px);
  border-radius: 50%;
  border: 1px solid rgba(183,209,244,0.58);
  background: rgba(13,27,45,0.66);
  display: flex;
  align-items: center;
  justify-content: center;
}
.cardVisualAttr img {
  width: 80%;
  height: 80%;
  object-fit: contain;
}
.cardVisualName {
  position: absolute;
  z-index: 3;
  left: calc(10px * var(--card-scale));
  right: calc(10px * var(--card-scale));
  top: calc(24px * var(--card-scale));
  text-align: center;
  font-weight: 700;
  font-size: clamp(12px, calc(16px * var(--card-scale)), 23px);
  color: #f2f8ff;
  text-shadow: 0 1px 3px rgba(0,0,0,0.6);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.cardVisualText {
  position: absolute;
  z-index: 3;
  left: calc(12px * var(--card-scale));
  right: calc(12px * var(--card-scale));
  bottom: calc(12px * var(--card-scale));
  min-height: calc(82px * var(--card-scale));
  max-height: calc(148px * var(--card-scale));
  overflow: auto;
  border: 1px solid rgba(178,206,244,0.42);
  border-radius: calc(10px * var(--card-scale));
  background: rgba(11,21,36,0.72);
  color: #d9e9ff;
  padding: calc(8px * var(--card-scale));
  font-size: clamp(11px, calc(13px * var(--card-scale)), 18px);
  line-height: 1.5;
  word-break: break-word;
  white-space: pre-wrap;
}
.cardHotspot {
  cursor: pointer;
  position: absolute;
}
.cardHotspot::after {
  content: attr(data-hover-label);
  position: absolute;
  left: 50%;
  top: -24px;
  transform: translateX(-50%);
  background: rgba(4, 14, 26, 0.95);
  border: 1px solid #4a74a8;
  color: #d9e9ff;
  font-size: 10px;
  border-radius: 999px;
  padding: 2px 8px;
  white-space: nowrap;
  opacity: 0;
  pointer-events: none;
}
.cardHotspot:hover {
  outline: 1px dashed rgba(134,198,255,0.9);
  background-color: rgba(117,180,238,0.14);
}
.cardHotspot:hover::after {
  opacity: 1;
}
.ideDrawerRail {
  position: fixed;
  top: 74px;
  right: 0;
  z-index: 65;
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.drawerTab {
  width: 34px;
  min-height: 86px;
  border: 1px solid #355c8f;
  border-right: 0;
  border-radius: 8px 0 0 8px;
  background: rgba(15, 32, 54, 0.96);
  color: #d6e8ff;
  cursor: pointer;
  writing-mode: vertical-rl;
  text-orientation: mixed;
  font-size: 11px;
  letter-spacing: 0.06em;
  padding: 8px 4px;
}
.utilityDrawerPanel {
  width: min(560px, 92vw);
  height: min(86vh, 820px);
  margin-right: 32px;
}

.cardListTools {
  display: grid;
  grid-template-columns: 1fr;
  gap: 8px;
  margin-bottom: 8px;
}
.cardListTools input,
.cardListTools select,
.cardInfoForm input,
.cardInfoForm select,
.cardInfoForm textarea,
.inspectorForm input,
.inspectorForm select,
.simForm input,
.simForm select,
.dslEditor textarea,
.legacyBlockBox textarea {
  width: 100%;
  border: 1px solid #2e4a73;
  background: #0f1b2f;
  color: var(--ide-text);
  border-radius: 8px;
  padding: 6px 8px;
  font-size: 12px;
}
.cardList {
  display: grid;
  gap: 6px;
}
.cardRowBtn {
  border: 1px solid #2b4367;
  background: #0e1a2b;
  color: var(--ide-text);
  border-radius: 8px;
  padding: 8px;
  text-align: left;
  cursor: pointer;
}
.cardRowBtn.active {
  border-color: #56b7ff;
  background: #17335a;
}

.nodeCanvasWrap {
  position: relative;
  height: 100%;
  background:
    linear-gradient(90deg, rgba(102, 142, 206, 0.12) 1px, transparent 1px),
    linear-gradient(180deg, rgba(102, 142, 206, 0.12) 1px, transparent 1px),
    radial-gradient(circle at 35% 20%, rgba(69, 124, 196, 0.35), transparent 46%),
    #0b1423;
  background-size: 24px 24px, 24px 24px, auto, auto;
  user-select: none;
  overflow: hidden;
}
.nodeViewport {
  position: absolute;
  inset: 0;
  transform-origin: 0 0;
}
.edgeLayer {
  position: absolute;
  inset: 0;
  overflow: visible;
}
.nodeLayer {
  position: absolute;
  inset: 0;
}
.graphNode {
  position: absolute;
  min-width: 150px;
  border: 1px solid #2e4b76;
  border-radius: 10px;
  background: linear-gradient(180deg, #192d4a, #13233a);
  box-shadow: 0 8px 18px rgba(2,8,16,0.5);
  color: #e5f0ff;
}
.graphNode.selected {
  border-color: var(--ide-accent);
  box-shadow: 0 0 0 2px rgba(73,179,255,0.4), 0 8px 18px rgba(2,8,16,0.5);
}
.graphNode .nodeHead {
  height: 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 8px;
  font-size: 11px;
  border-bottom: 1px solid #274062;
  cursor: move;
}
.graphNode .nodeBody {
  padding: 6px 8px;
  font-size: 12px;
  color: #cbe0ff;
  word-break: break-word;
}
.nodeCategory {
  color: #94b4e2;
  font-size: 10px;
  text-transform: uppercase;
}
.selectionRect {
  position: absolute;
  border: 1px dashed #58b9ff;
  background: rgba(68, 162, 255, 0.16);
  pointer-events: none;
}

.nodeLib {
  display: grid;
  gap: 6px;
}
.nodeLib button {
  border: 1px solid #355684;
  background: #14263f;
  color: #deecff;
  border-radius: 8px;
  font-size: 11px;
  padding: 6px;
  text-align: left;
  cursor: pointer;
}

.dslEditor {
  height: 100%;
  display: grid;
  grid-template-rows: minmax(200px, 1fr) auto minmax(140px, 0.7fr);
  gap: 6px;
  min-height: 0;
}
.dslEditor textarea {
  resize: none;
  min-height: 0;
  height: 100%;
  min-height: 200px;
  font-family: ui-monospace, Menlo, Consolas, monospace;
  line-height: 1.45;
}
.dslMeta {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}
.chip {
  border: 1px solid #365987;
  border-radius: 999px;
  padding: 2px 8px;
  font-size: 11px;
  color: #b9d0f2;
  white-space: nowrap;
}
.dslPreview {
  border: 1px solid #2a446b;
  border-radius: 8px;
  padding: 8px;
  font-family: ui-monospace, Menlo, Consolas, monospace;
  font-size: 11px;
  white-space: pre-wrap;
  background: #0d182a;
  color: #bad8ff;
}
.dslError {
  color: #ff8ba6;
  font-size: 11px;
}

.logGridBottom {
  min-height: 0;
  display: grid;
  grid-template-columns: minmax(0, 1fr) minmax(280px, 0.55fr);
  gap: 8px;
}
.logList {
  font-size: 11px;
  white-space: pre-wrap;
  color: #b8cff2;
  display: grid;
  gap: 3px;
}
.inspectorForm, .cardInfoForm, .simForm {
  display: grid;
  gap: 6px;
}
.formRow2 {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 6px;
}
.simActionRow {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}
.simActionRow button,
.ideSmallBtn,
.cardActionBtn {
  border: 1px solid #345680;
  background: #17325a;
  color: #e8f2ff;
  border-radius: 8px;
  padding: 6px 10px;
  font-size: 12px;
  cursor: pointer;
  white-space: nowrap;
  flex-shrink: 0;
}
.ideSmallBtn.danger,
.cardActionBtn.danger {
  border-color: #7b3452;
  background: #4a1f33;
}
.contextMenu {
  position: fixed;
  z-index: 50;
  min-width: 0;
  width: max-content;
  max-width: min(420px, calc(100vw - 16px));
  max-height: min(72vh, calc(100vh - 16px));
  overflow: auto;
  box-sizing: border-box;
  border: 1px solid #355986;
  background: #12253f;
  border-radius: 10px;
  box-shadow: 0 10px 24px rgba(0,0,0,0.35);
  padding: 6px;
}
.contextMenu button {
  width: auto;
  min-width: 100%;
  box-sizing: border-box;
  border: 0;
  background: transparent;
  color: #d6e7ff;
  text-align: left;
  border-radius: 8px;
  padding: 7px;
  cursor: pointer;
  font-size: 12px;
}
.contextMenu button:hover { background: #1d3960; }

@media (max-width: 1380px) {
  .cardIde {
    grid-template-rows: minmax(380px, 1fr) minmax(150px, 0.38fr);
  }
  .cardIdeMain {
    grid-template-columns: 250px minmax(0, 1fr) 300px;
  }
}
@media (max-width: 1180px) {
  .cardIde {
    height: auto;
    min-height: calc(100dvh - 54px);
    grid-template-rows: auto auto auto;
  }
  .cardIdeMain {
    grid-template-columns: 1fr;
    grid-auto-rows: minmax(260px, auto);
  }
  .rightStack {
    grid-template-rows: minmax(240px, auto);
  }
  .logGridBottom {
    grid-template-columns: 1fr;
  }
  .utilityDrawerPanel { margin-right: 0; width: min(640px, 96vw); }
}
@media (max-width: 760px) {
  .ideTopBar {
    padding: 0 8px;
  }
  .ideTopBar .btn {
    padding: 5px 8px;
    font-size: 12px;
  }
  .cardIde {
    padding: 6px;
    gap: 6px;
  }
  .idePanelHeader {
    font-size: 11px;
    padding: 0 8px;
  }
  .ideSmallBtn,
  .cardActionBtn {
    padding: 5px 8px;
    font-size: 11px;
  }
  .chip {
    font-size: 10px;
    padding: 2px 6px;
  }
  .ideDrawerRail { top: 62px; }
  .drawerTab { min-height: 72px; width: 30px; font-size: 10px; }
  .cardVisualFrame { width: min(100%, 260px); }
}
</style>
</head>
<body>
<div class="ideTopBar">
  <div class="ideBrand">DepenDrap Developer IDE</div>
  <div style="display:flex;gap:8px;">
    <button class="btn" id="goHomeBtn">Developer Home</button>
    <button class="btn" id="closeDevModeBtn">戻る</button>
  </div>
</div>

<div id="appRoot"></div>

<script src="js/network/messaging.js"></script>
<script>
if (localStorage.getItem("dev") !== "true") {
  showErrorMessage("権限がないにゃん");
  setTimeout(() => { location.href = "index.html"; }, 500);
}
</script>
<script src="js/dev/cardEffectBlockCatalog.js?v=1"></script>
<script src="js/dev/cardEffectBlockCompiler.js?v=1"></script>
<script src="js/game/effects/effectRuntimeV2.js?v=1"></script>
<script src="js/card/cardData.js"></script>
<script src="js/card/cardVisualLayout.js?v=1"></script>
<script src="js/deck/deckCode.js"></script>
<script src="js/state/gameState.js"></script>
<script src="js/state/syncState.js"></script>
<script src="js/game/core.js"></script>
<script src="js/card/cardCombatData.js?v=1"></script>
<script src="js/game/effects/effectEngine.js?v=1"></script>
<script src="js/dev/cardDebug.js?v=1"></script>
<script src="js/dev/devTools.js"></script>
<script src="js/ui/menu.js?v=5"></script>
<script src="js/statusBlocks/statusBlockPresets.js"></script>
<script src="js/statusBlocks/statusBlockPresetStorage.js"></script>
<script src="js/patchNotes/patchNotesLoader.js"></script>
<script src="js/patchNotes/patchNotesEditor.js"></script>
<script src="js/dev/cardEditorIDE.js?v=1"></script>
</body>
</html>
