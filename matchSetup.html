<!DOCTYPE html>
<html lang="ja" translate="no">
<head>
<meta charset="UTF-8">
<meta name="google" content="notranslate">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>DepenDrap - 対戦設定</title>
<link rel="icon" href="assets/favicon.png">
<link rel="stylesheet" href="css/style.css?v=2">
<style>
  body {
    margin:0; min-height:100vh;
    background:radial-gradient(circle at center, #1a172c 0%, #08060f 100%);
    color:#e0d0a0;
    font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    display:flex; align-items:center; justify-content:center;
  }
  .matchSetup {
    width:min(860px, calc(100vw - 32px));
    background:rgba(20,18,32,0.92); border:1px solid #c7b377;
    border-radius:12px; padding:30px;
    box-shadow:0 15px 50px rgba(0,0,0,0.85);
    display:flex; flex-direction:column; gap:20px;
  }
  .matchSetup h1 {
    margin:0; font-size:28px; font-weight:700; letter-spacing:4px;
    text-align:center; color:#fff; text-shadow:0 0 10px rgba(199,179,119,0.5);
  }
  .setupGrid { display:grid; grid-template-columns:1fr 1fr; gap:24px; }
  .setupField { display:flex; flex-direction:column; gap:10px; }
  .setupField label {
    font-size:12px; color:#b0a070; font-weight:bold;
    text-transform:uppercase; letter-spacing:1.5px;
  }
  .setupField input, .setupField select {
    box-sizing:border-box; width:100%;
    background:rgba(0,0,0,0.6); border:1px solid #5a4b27;
    color:#fff; border-radius:6px; padding:12px; font-size:15px;
  }
  /* ルーム一覧 */
  #roomList {
    display:flex; flex-direction:column; gap:8px;
    max-height:200px; overflow-y:auto;
  }
  .roomItem {
    display:flex; align-items:center; justify-content:space-between;
    background:rgba(0,0,0,0.4); border:1px solid #5a4b27;
    border-radius:6px; padding:10px 14px; cursor:pointer;
    transition:all 0.2s;
  }
  .roomItem:hover { border-color:#c7b377; background:rgba(199,179,119,0.1); }
  .roomItem .room-name { font-weight:bold; letter-spacing:1px; }
  .roomItem .room-players { font-size:12px; color:#888; }
  .roomItem .room-join-btn {
    background:rgba(199,179,119,0.2); border:1px solid #c7b377;
    color:#e0d0a0; padding:4px 12px; border-radius:4px; cursor:pointer;
    font-size:12px; font-weight:bold;
  }
  .roomItem .room-join-btn:hover { background:rgba(199,179,119,0.4); }
  /* デッキギャラリー */
  .deckGallery {
    display:flex; gap:12px; overflow-x:auto; padding:10px 5px;
    scrollbar-width:thin; scrollbar-color:#5a4b27 transparent;
  }
  .deckCard {
    flex:0 0 110px; aspect-ratio:210/297; background:#000;
    border:2px solid #3a321a; border-radius:6px; cursor:pointer;
    position:relative; transition:all 0.25s; overflow:hidden;
  }
  .deckCard:hover { transform:translateY(-5px); border-color:#c7b377; }
  .deckCard.selected { border-color:#c7b377; box-shadow:0 0 15px rgba(199,179,119,0.6); transform:scale(1.05) translateY(-5px); }
  .deckCard img { width:100%; height:100%; object-fit:cover; opacity:0.7; }
  .deckCard.selected img { opacity:1; }
  .deckCardName {
    position:absolute; bottom:0; left:0; right:0;
    background:linear-gradient(transparent, rgba(0,0,0,0.9));
    padding:15px 5px 5px; font-size:10px; text-align:center; color:#fff;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }
  /* Ready ステータス */
  .readyStatus { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
  .readyPill {
    border:1px solid #5a4b27; border-radius:8px; padding:14px;
    background:rgba(0,0,0,0.4); color:#9f936e; font-size:14px;
    display:flex; align-items:center; justify-content:space-between; transition:all 0.3s;
  }
  .readyPill.ready { border-color:#70c070; background:rgba(112,192,112,0.1); color:#baf0ba; }
  .readyIndicator { width:10px; height:10px; border-radius:50%; background:#555; }
  .readyPill.ready .readyIndicator { background:#70c070; box-shadow:0 0 8px #70c070; }
  /* ボタン */
  .setupActions { display:flex; justify-content:center; gap:20px; }
  .lorBtn {
    padding:12px 30px; font-size:16px; font-weight:bold; min-width:160px;
    border-radius:4px; cursor:pointer; font-family:inherit; transition:all 0.2s;
    background:rgba(199,179,119,0.15); border:1px solid rgba(199,179,119,0.5); color:#e0d0a0;
  }
  .lorBtn:hover { background:rgba(199,179,119,0.3); }
  #startBtn { 
    background:linear-gradient(to bottom, #c7b377, #a88e4a); 
    color:#1a172c; 
    border:none; 
    width: 80%;
    min-height: 60px;
    font-size: 22px;
    letter-spacing: 2px;
    box-shadow: 0 5px 15px rgba(199,179,119,0.4);
    margin: 10px auto;
  }
  #startBtn:hover:not(:disabled) {
    transform: translateY(-2px);
    box-shadow: 0 8px 20px rgba(199,179,119,0.6);
  }
  #startBtn:disabled { opacity:0.5; cursor:not-allowed; box-shadow: none; }
  #cancelBtn { background:#4a1a1a; border:1px solid #ff6b6b; color:#ff6b6b; min-height: 50px; }
  /* 接続状態 */
  #photonStatus {
    text-align:center; font-size:12px; color:#888; letter-spacing:1px;
    padding:6px; background:rgba(0,0,0,0.3); border-radius:4px;
  }
  #photonStatus.ok { color:#70c070; }
</style>
</head>
<body>
<button class="back-btn" onclick="location.href='index.html'">戻る</button>

<main class="matchSetup">
  <h1>ARENA LOBBY</h1>

  <div id="photonStatus">Photon 接続中...</div>

  <!-- ルーム作成 / 参加 -->
  <div class="setupGrid">
    <div class="setupField">
      <label>YOUR NAME</label>
      <input id="myPlayer" type="text" readonly>
    </div>
    <div class="setupField">
      <label>ROOM CODE（任意）</label>
      <input id="roomCodeInput" type="text" placeholder="例: ABCD12" maxlength="10"
             style="text-transform:uppercase;">
    </div>
  </div>

  <div class="setupActions" style="margin-top:0;">
    <button class="lorBtn" id="createRoomBtn" type="button">ルームを作成</button>
    <button class="lorBtn" id="joinRoomBtn"   type="button">コードで参加</button>
  </div>

  <!-- ルーム一覧 -->
  <div class="setupField">
    <label>公開ルーム一覧</label>
    <div id="roomList"><div style="color:#666;font-size:13px;padding:10px;">ルームを検索中...</div></div>
  </div>

  <!-- デッキ選択 -->
  <div class="setupField">
    <label>SELECT DECK</label>
    <div class="deckGallery" id="deckGallery"></div>
    <select id="deckSelect" style="display:none;"></select>
  </div>

  <!-- Ready ステータス -->
  <div class="readyStatus">
    <div id="myReadyStatus" class="readyPill">
      <span>YOU: UNREADY</span>
      <div class="readyIndicator"></div>
    </div>
    <div id="opponentReadyStatus" class="readyPill">
      <span>OPPONENT: WAITING</span>
      <div class="readyIndicator"></div>
    </div>
  </div>

  <div id="setupMsg" style="text-align:center; font-weight:bold; min-height:24px;"></div>

  <div class="setupActions" style="flex-wrap: wrap;">
    <button class="lorBtn" id="cancelBtn" type="button" style="display:none; width:80%; margin: 0 auto;">LEAVE ROOM</button>
    <button class="lorBtn" id="startBtn"  type="button" disabled>READY</button>
  </div>
</main>

<!-- Socket.io Client -->
<script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
<script src="js/socket-sync.js?v=1"></script>
<script src="js/cardData.js?v=8"></script>
<script src="js/deckCode.js?v=8"></script>
<script src="js/matchSetup.js?v=8"></script>
</body>
</html>
