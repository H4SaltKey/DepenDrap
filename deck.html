<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>DepenDrap</title>
<link rel="icon" href="assets/favicon.png">
<link rel="stylesheet" href="css/style.css">
</head>
<body class="deckPage">

<main class="deckBuilder">
  <header class="deckPageHeader">
    <button class="back-btn-inline" onclick="location.href='deckSelect.html'">保存して戻る</button>
    <div class="title-group">
      <h2>デッキ構築</h2>
      <span id="deckTitle"></span>
    </div>
  </header>

  <section class="deckSection cardCatalog">

    <div class="cardCatalogMain">

      <header class="cardListHeader">
        <div class="cardListTitleRow">
          <h3>カード一覧</h3>
          <div id="deckMessage"></div>
        </div>
        <div class="deckFilters">
          <div class="filterGroup filterTagGroup">
            <label for="filterTagInput">タグ検索</label>
            <input type="text" id="filterTagInput" placeholder="例: 火力, 範囲, 支援">
          </div>
          <div class="filterControl">
            <button id="toggleFilterButton" class="smallBtn filterToggleBtn" type="button" aria-expanded="false">フィルター</button>
            <div id="filterPanel" class="filterPanel hidden">
              <div class="filterGroup">
                <label>属性でフィルター</label>
                <label><input type="radio" name="filterAttribute" value="all" checked> 全て</label>
                <label><input type="radio" name="filterAttribute" value="近接"> 近接</label>
                <label><input type="radio" name="filterAttribute" value="遠隔"> 遠隔</label>
                <label><input type="radio" name="filterAttribute" value="魔法"> 魔法</label>
              </div>
              <div class="filterGroup">
                <label>カードタイプでフィルター</label>
                <label><input type="radio" name="filterType" value="all" checked> 全て</label>
                <label><input type="radio" name="filterType" value="アタッカー"> アタッカー</label>
                <label><input type="radio" name="filterType" value="スキル"> スキル</label>
                <label><input type="radio" name="filterType" value="サポート"> サポート</label>
              </div>
            </div>
          </div>
        </div>
      </header>

      <!-- カード一覧 -->
      <div class="pagedRow cardListControls">

        <button class="pageButton" id="cardsPrev" type="button">‹</button>

        <!-- 追加した viewport -->
        <div class="cardListViewport">
        <div class="cardListScroll">
          <div id="cards" class="cardRow"></div>
        </div>
        <button class="pageButton" id="cardsNext" type="button">›</button>

      </div>

    </div>

  </section>

  <section class="deckSection deckArea" id="deckDropZone">
    <div class="deckToolbar">
      <h3>デッキ</h3>
      <div class="deckHeaderControls">
        <div class="deckCodeBox">
          <label for="deckCodeInput">デッキコード</label>
          <div class="deckCodeInner">
            <input id="deckCodeInput" type="text" readonly>
            <button id="copyDeckCodeBtn" type="button">コピー</button>
          </div>
        </div>
        <button id="btnLoadCode" class="smallBtn" type="button">コードから読み込み</button>
        <div class="backImageControls">
          <span>スリーブ:</span>
          <div id="backImagePreview" class="backImagePreview" title="クリックして画像を選択">
            <img id="backImagePreviewImg" src="" alt="" style="display:none;">
            <span id="backImagePreviewNone">なし</span>
          </div>
          <button id="btnSetBackImage" class="smallBtn" type="button">選択</button>
          <button id="btnClearBackImage" class="smallBtn dangerBtn" type="button">✕</button>
          <input type="file" id="backImageInput" accept="image/*" style="display:none;">
        </div>
      </div>
    </div>
    <div id="codeImportRow" class="hidden" style="gap:6px;align-items:center;padding:4px 0;">
      <input type="text" id="codeImportInput" placeholder="デッキコードを入力" style="flex:1;font-size:13px;padding:4px 6px;border:1px solid #aaa;">
      <button id="codeImportConfirm" style="padding:4px 12px;font-size:13px;background:#2f80ed;color:white;border:none;border-radius:3px;cursor:pointer;">適用</button>
      <button id="codeImportCancel" style="padding:4px 10px;font-size:13px;cursor:pointer;">✕</button>
    </div>
    <div id="codeImportError" style="font-size:12px;color:#c00;min-height:14px;padding:0 2px;"></div>
    <div class="pagedRow">
      <button class="pageButton" id="deckPrev" type="button">‹</button>
      <div id="deck" class="cardRow cardRowDeck"></div>
      <button class="pageButton" id="deckNext" type="button">›</button>
    </div>
  </section>
</main>

<div id="deckContextMenu" class="contextMenu hidden"></div>
<div id="cardZoomModal" class="cardZoomModal hidden" onclick="if(event.target === this) hideCardZoom();">
  <div class="cardZoomContent">
    <img id="cardZoomImage" src="" alt="拡大カード画像">
    <div class="cardZoomInfo" id="cardZoomInfo"></div>
    <button class="cardZoomClose" type="button" onclick="hideCardZoom()">閉じる</button>
  </div>
</div>

<script src="js/cardData.js"></script>
<script src="js/deckCode.js"></script>
<script src="js/deck.js"></script>
<script src="js/menu.js?v=5"></script>

</body>
</html>
