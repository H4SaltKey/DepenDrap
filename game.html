<!-- Firebase Configuration -->
<script>

    apiKey: "AIzaSyDNe58gGvJ3-09brUHkoorkQalrS8jkPAw",
    authDomain: "dependrap-c30b4.firebaseapp.com",
    databaseURL: "https://dependrap-c30b4-default-rtdb.firebaseio.com",
    projectId: "dependrap-c30b4",

<body>

<div id="gameUiEnemy"></div>
<div id="gameUiPlayer">
  <div id="chatArea">
    <div id="chatLogs"></div>
    <div id="chatInputRow">
      <input type="text" id="chatInput" placeholder="メッセージを入力...">
      <button type="button" id="chatSendBtn">送信</button>
    </div>
  </div>
  <div id="gameUiPlayerInner"></div>
</div>

<div id="zoomControls">
  <div id="cameraActionRow">
    <button type="button" class="actionBtn" onclick="centerField()">Center</button>
  </div>
  <div id="zoomSliderRow">
    <button type="button" class="zoomBtn" onclick="zoomField(-1)">-</button>
    <input id="zoomSlider" type="range" min="0.15" max="0.8" step="0.01" value="0.7" aria-label="フィールド拡大率">
    <button type="button" class="zoomBtn" onclick="zoomField(1)">+</button>
  </div>
</div>

<!-- Firebase SDK (Compat version for global firebase object) -->
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database-compat.js"></script>
<script src="js/firebase-client.js?v=10"></script>

<script src="js/cardData.js?v=8"></script>
<script src="js/deckCode.js?v=8"></script>
<script src="js/core.js?v=10"></script>
<script src="js/cardManager.js?v=13"></script>
<script src="js/game.js?v=43"></script>
<script src="js/menu.js?v=10"></script>
<script src="js/devTools.js?v=3"></script>
<script src="js/damageCalc.js?v=4"></script>

<div id="field">
  <div id="fieldBgBlur"></div>
  <div id="fieldContent">
    <div id="fieldBg"></div>
  </div>
</div>

<script src="js/contextMenu.js?v=15"></script>
<script>
  (async () => {
    await initCards();

    window.addEventListener("load", async () => {
      console.log("[Game] Firebase 初期化中...");

      // gameRoom が存在しない場合はマッチ画面へリダイレクト（直接アクセス対策）
      const gameRoomName  = localStorage.getItem("gameRoom");
      const gamePlayerKey = localStorage.getItem("gamePlayerKey");
      if (!gameRoomName || !gamePlayerKey) {
        console.warn("[Game] gameRoom/gamePlayerKey が未設定。matchSetup へリダイレクト。");
        location.href = "matchSetup.html";
        return;
      }

      const success = await firebaseClient.initialize(window.FIREBASE_CONFIG);
      if (!success) {
        console.warn("[Game] ⚠️ Firebase 初期化失敗");
        document.dispatchEvent(new Event("firebaseJoined")); // オフラインでも initGame は走らせる
        return;
      }

      console.log("[Game] ✅ Firebase 初期化成功");

      try {
        // rooms/players から両プレイヤーの username を取得して state に紐づける
        const roomSnap = await firebaseClient.db.ref(`rooms/${gameRoomName}/players`).once('value');
        if (roomSnap.exists()) {
          const players = roomSnap.val();
          if (players.player1?.username) {
            if (typeof state !== "undefined" && state.player1) state.player1.username = players.player1.username;
            if (gamePlayerKey === "player1") window.myUsername = players.player1.username;
          }
          if (players.player2?.username) {
            if (typeof state !== "undefined" && state.player2) state.player2.username = players.player2.username;
            if (gamePlayerKey === "player2") window.myUsername = players.player2.username;
          }
          console.log("[Game] プレイヤー名紐づけ完了:", {
            player1: players.player1?.username,
            player2: players.player2?.username
          });
        }

        // onDisconnect を設定（切断時に rooms/players から自動削除）
        await firebaseClient.setupOnDisconnect(gameRoomName, gamePlayerKey);

      } catch (e) {
        console.warn("[Game] Firebase 前処理エラー:", e);
      }

      document.dispatchEvent(new Event("firebaseJoined"));
    });

    // beforeunload では退出しない（リロード時に接続を維持するため）
    // 離脱判定は Firebase onDisconnect に委譲する
  })();
</script>

</body>
</html>
