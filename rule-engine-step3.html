<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ルールエンジン — ステップ3 検証</title>
  <style>
    :root {
      --bg: #0d1117;
      --panel: #161b22;
      --border: #30363d;
      --text: #e6edf3;
      --dim: #8b949e;
      --accent: #f0883e;
      --ok: #3fb950;
      --ng: #f85149;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: "Segoe UI", "Noto Sans JP", sans-serif;
      padding: 24px;
    }
    h1 { font-size: 1.25rem; margin: 0 0 8px; }
    p { color: var(--dim); margin: 0 0 16px; }
    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px;
      margin-bottom: 16px;
    }
    button {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 10px 16px;
      font-size: 14px;
      cursor: pointer;
      margin-right: 8px;
      margin-bottom: 8px;
    }
    button.secondary {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
    }
    pre {
      background: #010409;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px;
      overflow: auto;
      font-size: 12px;
      line-height: 1.5;
    }
    .ok { color: var(--ok); }
    .ng { color: var(--ng); }
    .log-line { margin: 4px 0; }
  </style>
</head>
<body>
  <h1>ルール処理エンジン — ステップ3</h1>
  <p>トリガー（割り込み・連鎖）— 汎用 DSL のみ（カード固有実装なし）</p>

  <div class="panel">
    <button id="btnAuto">自動検証を実行</button>
    <button id="btnChain" class="secondary">連鎖ドローデモ</button>
    <button id="btnInterrupt" class="secondary">割り込みデモ</button>
  </div>

  <div class="panel">
    <strong>ログ</strong>
    <div id="log"></div>
  </div>

  <div class="panel">
    <strong>ゲーム状態 (JSON)</strong>
    <pre id="stateView">—</pre>
  </div>

  <script type="module">
    import { RuleEngine } from "./js/ruleEngine/index.js";
    import { registerContinuousEffect } from "./js/ruleEngine/continuousEffects.js";
    import { runStep3Verification, TRIGGER_MIRROR_SAMPLE } from "./js/ruleEngine/verifyStep3.js";

    const logEl = document.getElementById("log");
    const stateView = document.getElementById("stateView");

    function log(msg, ok = true) {
      const div = document.createElement("div");
      div.className = "log-line " + (ok ? "ok" : "ng");
      div.textContent = (ok ? "✓ " : "✗ ") + msg;
      logEl.appendChild(div);
    }

    function showState(state) {
      stateView.textContent = JSON.stringify(state.snapshot(), null, 2);
    }

    document.getElementById("btnAuto").addEventListener("click", () => {
      logEl.innerHTML = "";
      try {
        runStep3Verification().forEach((r) => log(r));
        log("すべての自動検証に合格しました");
      } catch (e) {
        log(e.message, false);
      }
    });

    document.getElementById("btnChain").addEventListener("click", () => {
      logEl.innerHTML = "";
      const engine = new RuleEngine({
        hand: [{ ...TRIGGER_MIRROR_SAMPLE }],
        deck: [
          { id: "D1", name: "山札1" },
          { id: "D2", name: "山札2" },
          { id: "D3", name: "山札3" }
        ]
      });
      log("トリガー鏡像を場に出して常駐登録…");
      engine.playCardFromHand("TRIGGER_MIRROR");
      engine.resolveAll();
      log("DRAW_CARD 1回を実行（ON_DRAW 連鎖あり）");
      engine.push({ action: "DRAW_CARD", value: 1 });
      const steps = engine.resolveAll();
      steps.forEach((row, i) => {
        const label = row.effect._triggeredBy
          ? `割込(${row.effect._triggeredBy})`
          : row.effect.action;
        log(`step ${i + 1}: ${label}`);
      });
      log(`結果 — 手札 ${engine.gameState.hand.length}枚 / 山札 ${engine.gameState.deck.length}枚`);
      showState(engine.gameState);
    });

    document.getElementById("btnInterrupt").addEventListener("click", () => {
      logEl.innerHTML = "";
      const engine = new RuleEngine({ pp: 0, ppMax: 2, deck: [
        { id: "D1", name: "山札1" },
        { id: "D2", name: "山札2" }
      ]});
      registerContinuousEffect(engine.gameState, {
        kind: "TRIGGER",
        listenEvent: "ON_DRAW",
        oncePerChain: true,
        response: { action: "DRAW_CARD", value: 1 },
        sourceCardName: "割込サンプル"
      });
      log("スタック: [RECOVER_PP, DRAW_CARD]（LIFOで DRAW が先）");
      engine.push({ action: "RECOVER_PP", value: 1 });
      engine.push({ action: "DRAW_CARD", value: 1 });
      const steps = engine.resolveAll();
      steps.forEach((row, i) => {
        log(`step ${i + 1}: ${row.effect.action}${row.effect._triggeredBy ? " ← " + row.effect._triggeredBy : ""}`);
      });
      log(`PP ${engine.gameState.pp} / 手札 ${engine.gameState.hand.length}枚`);
      showState(engine.gameState);
    });
  </script>
</body>
</html>
