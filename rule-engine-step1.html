<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ルールエンジン — ステップ1 検証</title>
  <style>
    :root {
      --bg: #0d1117;
      --panel: #161b22;
      --border: #30363d;
      --text: #e6edf3;
      --dim: #8b949e;
      --accent: #58a6ff;
      --ok: #3fb950;
      --ng: #f85149;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: "Segoe UI", "Noto Sans JP", sans-serif;
      padding: 24px;
    }
    h1 { font-size: 1.25rem; margin: 0 0 8px; }
    p { color: var(--dim); margin: 0 0 16px; }
    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px;
      margin-bottom: 16px;
    }
    button {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 10px 16px;
      font-size: 14px;
      cursor: pointer;
      margin-right: 8px;
    }
    button.secondary {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
    }
    pre {
      background: #010409;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px;
      overflow: auto;
      font-size: 12px;
      line-height: 1.5;
    }
    .ok { color: var(--ok); }
    .ng { color: var(--ng); }
    .log-line { margin: 4px 0; }
  </style>
</head>
<body>
  <h1>ルール処理エンジン — ステップ1</h1>
  <p>GameState / EffectStack / カード DSL の基本動作を検証します。</p>

  <div class="panel">
    <button id="btnAuto">自動検証を実行</button>
    <button id="btnDemo" class="secondary">デモプレイ（基本サンプル）</button>
  </div>

  <div class="panel">
    <strong>ログ</strong>
    <div id="log"></div>
  </div>

  <div class="panel">
    <strong>ゲーム状態 (JSON)</strong>
    <pre id="stateView">—</pre>
  </div>

  <script type="module">
    import {
      GameState,
      EffectStack,
      playCardFromHand
    } from "./js/ruleEngine/index.js";
    import { runStep1Verification } from "./js/ruleEngine/verifyStep1.js";

    const logEl = document.getElementById("log");
    const stateView = document.getElementById("stateView");

    function log(msg, ok = true) {
      const div = document.createElement("div");
      div.className = "log-line " + (ok ? "ok" : "ng");
      div.textContent = (ok ? "✓ " : "✗ ") + msg;
      logEl.appendChild(div);
    }

    function showState(state) {
      stateView.textContent = JSON.stringify(state.snapshot(), null, 2);
    }

    let demoState = null;
    let demoStack = null;

    function resetDemo() {
      demoState = new GameState({
        hp: 20,
        pp: 1,
        ppMax: 2,
        hand: [{
          id: "BASIC_SAMPLE",
          name: "基本サンプル",
          type: "MAGIC",
          effects: [{
            trigger: "ON_PLAY",
            action: "DRAW_CARD",
            value: 1
          }]
        }],
        deck: [
          { id: "DECK_A", name: "山札A" },
          { id: "DECK_B", name: "山札B" },
          { id: "DECK_C", name: "山札C" }
        ]
      });
      demoStack = new EffectStack();
      showState(demoState);
    }

    document.getElementById("btnAuto").addEventListener("click", () => {
      logEl.innerHTML = "";
      try {
        const results = runStep1Verification();
        results.forEach((r) => log(r));
        log("すべての自動検証に合格しました");
      } catch (e) {
        log(e.message, false);
      }
    });

    document.getElementById("btnDemo").addEventListener("click", () => {
      if (!demoState) resetDemo();
      logEl.innerHTML = "";

      log(`手札: ${demoState.hand.map((c) => c.name).join(", ") || "(空)"}`);
      log(`山札: ${demoState.deck.length}枚`);

      const play = playCardFromHand("BASIC_SAMPLE", demoState, demoStack);
      if (!play.played) {
        log("プレイ失敗: " + play.reason, false);
        return;
      }
      log(`「${play.card.name}」を場に出した → スタック ${play.enqueue.enqueued}件`);

      const resolutions = demoStack.resolveAll(demoState);
      resolutions.forEach((row, i) => {
        const r = row.result;
        log(`resolve #${i + 1}: ${r.action} — ${r.drawn ?? 0}枚ドロー`);
      });

      log(`結果 — 手札: ${demoState.hand.length}枚, 場: ${demoState.field.length}枚, 山札: ${demoState.deck.length}枚`);
      showState(demoState);
    });

    resetDemo();
  </script>
</body>
</html>
