<!DOCTYPE html>
<html lang="ja" translate="no">
<head>
<meta charset="UTF-8">
<meta name="google" content="notranslate">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>DepenDrap - 対戦設定</title>
<link rel="icon" href="assets/favicon.png">
<link rel="stylesheet" href="css/style.css?v=2">

  };
</script>
<style>
*, *::before, *::after { box-sizing: border-box; }
body {
  margin: 0; padding: 0;
  width: 100vw; height: 100vh; overflow: hidden;
  background: radial-gradient(circle at 30% 50%, #1a172c 0%, #08060f 100%);
  color: #e0d0a0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}

/* ===== 戻るボタン ===== */
.back-btn {
  position: fixed; top: 12px; left: 12px; z-index: 300;
  background: rgba(10,8,20,0.85); border: 1px solid #5a4b27;
  color: #b0a070; padding: 5px 12px; border-radius: 4px;
  cursor: pointer; font-size: 12px; transition: all 0.2s;
}
.back-btn:hover { border-color: #c7b377; color: #e0d0a0; }

/* ===== グリッドレイアウト ===== */
/* 左: 自分エリア(上) + チャット(下)  中: ルーム  右: 相手 */
#msLayout {
  display: grid;
  grid-template-columns: 260px 1fr 240px;
  grid-template-rows: 1fr 200px;
  width: 100vw; height: 100vh;
  gap: 0;
}

/* 左上 */
#msLeft {
  grid-column: 1; grid-row: 1;
  display: flex; flex-direction: column; gap: 10px;
  padding: 52px 14px 10px 14px;
  border-right: 1px solid rgba(199,179,119,0.12);
  background: rgba(8,6,18,0.6);
  overflow: hidden;
}

/* 左下: チャット */
#msChat {
  grid-column: 1; grid-row: 2;
  display: flex; flex-direction: column;
  border-right: 1px solid rgba(199,179,119,0.12);
  border-top: 1px solid rgba(199,179,119,0.12);
  background: rgba(6,4,14,0.7);
  overflow: hidden;
}

/* 中央（2行分） */
#msCenter {
  grid-column: 2; grid-row: 1 / 3;
  display: flex; flex-direction: column; gap: 10px;
  padding: 14px; overflow: hidden;
}

/* 右（2行分） */
#msRight {
  grid-column: 3; grid-row: 1 / 3;
  display: flex; flex-direction: column; gap: 10px;
  padding: 14px;
  border-left: 1px solid rgba(199,179,119,0.12);
  background: rgba(8,6,18,0.6);
  overflow: hidden;
}

/* ===== 共通パーツ ===== */
.sec-label {
  font-size: 10px; color: #7a6a40; letter-spacing: 1.5px;
  text-transform: uppercase; font-weight: bold;
  margin-bottom: 6px;
}
.panel-box {
  background: rgba(0,0,0,0.3); border: 1px solid rgba(199,179,119,0.12);
  border-radius: 6px; padding: 10px;
}

/* ===== 左上: 自分エリア ===== */
#msPlayerName {
  font-size: 17px; font-weight: 700; letter-spacing: 1px;
  color: #e0d0a0; padding: 8px 10px;
  background: rgba(0,0,0,0.35); border: 1px solid #3a321a;
  border-radius: 5px; flex-shrink: 0;
}
#msPlayerName .sec-label { margin-bottom: 2px; }

/* 選択中デッキ */
#msCurrentDeck {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 10px;
  background: rgba(0,0,0,0.3); border: 1px solid #3a321a;
  border-radius: 5px; cursor: pointer; transition: all 0.2s;
  flex-shrink: 0;
}
#msCurrentDeck:hover { border-color: #c7b377; background: rgba(199,179,119,0.05); }
#msCurrentDeck .deck-thumb {
  width: 36px; height: 51px; object-fit: cover;
  border-radius: 3px; border: 1px solid #3a321a; flex-shrink: 0;
}
#msCurrentDeck .deck-info { flex: 1; min-width: 0; }
.deck-name { font-size: 13px; font-weight: bold; color: #e0d0a0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.deck-count { font-size: 10px; color: #777; margin-top: 2px; }
.deck-hint { font-size: 9px; color: #c7b377; margin-top: 3px; }

/* READY ボタン */
#startBtn {
  padding: 14px 10px; font-size: 20px; font-weight: 900; letter-spacing: 3px;
  background: linear-gradient(to bottom, #c7b377, #a88e4a);
  color: #1a172c; border: none; border-radius: 6px;
  cursor: pointer; transition: all 0.2s;
  box-shadow: 0 4px 14px rgba(199,179,119,0.3);
  position: relative; overflow: hidden; flex-shrink: 0;
}
#startBtn::after {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(180deg, rgba(255,255,255,0.1) 0%, transparent 55%);
  pointer-events: none;
}
#startBtn:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 6px 18px rgba(199,179,119,0.5); }
#startBtn:disabled { opacity: 0.38; cursor: not-allowed; box-shadow: none; transform: none; }
#startBtn.isReady {
  background: linear-gradient(to bottom, #70c070, #3a8a3a);
  box-shadow: 0 4px 14px rgba(112,192,112,0.35); color: #fff;
}
#startBtn .btn-sub {
  display: block; font-size: 10px; font-weight: 400;
  letter-spacing: 0.5px; margin-top: 3px; opacity: 0.7;
}

/* 退室ボタン */
#cancelBtn {
  padding: 6px 10px; font-size: 11px; font-weight: bold;
  background: rgba(60,10,10,0.6); border: 1px solid rgba(255,107,107,0.35);
  color: #ff8888; border-radius: 4px; cursor: pointer; transition: all 0.2s;
  display: none; flex-shrink: 0;
}
#cancelBtn:hover { background: rgba(100,20,20,0.8); border-color: #ff6b6b; }

/* Firebase 状態 */
#firebaseStatus {
  font-size: 10px; color: #444; letter-spacing: 1px;
  padding: 3px 6px; border-radius: 3px;
  background: rgba(0,0,0,0.2); text-align: center; flex-shrink: 0;
}
#firebaseStatus.ok { color: #5a9a5a; }

/* ===== 左下: チャット ===== */
#msChat .chat-header {
  font-size: 10px; color: #7a6a40; letter-spacing: 1.5px;
  text-transform: uppercase; font-weight: bold;
  padding: 6px 10px; border-bottom: 1px solid rgba(199,179,119,0.1);
  flex-shrink: 0;
}
#chatLog {
  flex: 1; overflow-y: auto; padding: 6px 8px;
  display: flex; flex-direction: column; gap: 3px;
  scrollbar-width: thin; scrollbar-color: #3a321a transparent;
  min-height: 0;
}
.chatLine { font-size: 11px; line-height: 1.35; word-break: break-all; }
.chatLine.system { color: #666; font-style: italic; }
.chatLine.mine   { color: #c7b377; }
.chatLine.other  { color: #d0c090; }
#chatInputRow {
  display: flex; border-top: 1px solid rgba(199,179,119,0.1); flex-shrink: 0;
}
#chatInput {
  flex: 1; padding: 6px 8px;
  background: rgba(0,0,0,0.4); border: none;
  color: #e0d0a0; font-size: 12px;
}
#chatInput:focus { outline: none; background: rgba(0,0,0,0.6); }
#chatSendBtn {
  padding: 6px 12px; background: rgba(199,179,119,0.1);
  border: none; border-left: 1px solid rgba(199,179,119,0.15);
  color: #c7b377; cursor: pointer; font-size: 11px; font-weight: bold;
  transition: all 0.2s;
}
#chatSendBtn:hover { background: rgba(199,179,119,0.25); }

/* ===== 中央: ルーム ===== */
#msRoomArea {
  display: flex; flex-direction: column; gap: 8px;
  padding: 12px; background: rgba(0,0,0,0.28);
  border: 1px solid rgba(199,179,119,0.12); border-radius: 6px;
  flex-shrink: 0;
}
#msRoomInputRow { display: flex; gap: 6px; }
#roomNameInput {
  flex: 1; padding: 8px 10px;
  background: rgba(0,0,0,0.5); border: 1px solid #3a321a;
  color: #fff; border-radius: 4px; font-size: 13px;
}
#roomNameInput:focus { outline: none; border-color: #c7b377; }
#msRoomBtns { display: flex; gap: 6px; }
.msRoomBtn {
  flex: 1; padding: 8px 6px; font-size: 12px; font-weight: bold;
  border-radius: 4px; cursor: pointer; transition: all 0.2s;
  background: rgba(199,179,119,0.1); border: 1px solid rgba(199,179,119,0.35);
  color: #e0d0a0;
}
.msRoomBtn:hover { background: rgba(199,179,119,0.22); border-color: #c7b377; }
.msRoomBtn:disabled { opacity: 0.4; cursor: not-allowed; }

/* ルーム一覧 */
#msRoomListWrap {
  flex: 1; display: flex; flex-direction: column; gap: 6px; min-height: 0;
}
#msRoomListHeader {
  display: flex; align-items: center; justify-content: space-between;
  flex-shrink: 0;
}
#roomRefreshBtn {
  padding: 3px 10px; font-size: 10px; font-weight: bold;
  background: rgba(199,179,119,0.08); border: 1px solid rgba(199,179,119,0.3);
  color: #b0a070; border-radius: 3px; cursor: pointer; transition: all 0.2s;
  letter-spacing: 0.5px;
}
#roomRefreshBtn:hover:not(:disabled) { background: rgba(199,179,119,0.2); color: #e0d0a0; border-color: #c7b377; }
#roomRefreshBtn:disabled { opacity: 0.35; cursor: not-allowed; }
#roomRefreshCooldown { font-size: 9px; color: #555; margin-left: 4px; }
#roomList {
  flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 5px;
  scrollbar-width: thin; scrollbar-color: #3a321a transparent;
}
.roomItem {
  display: flex; align-items: center; justify-content: space-between;
  background: rgba(0,0,0,0.3); border: 1px solid #2a2210;
  border-radius: 5px; padding: 8px 10px; cursor: pointer; transition: all 0.2s;
  flex-shrink: 0;
}
.roomItem:hover { border-color: #c7b377; background: rgba(199,179,119,0.07); }
.room-name { font-weight: bold; font-size: 12px; letter-spacing: 0.5px; }
.room-players { font-size: 10px; color: #666; }
.room-btn-group { display: flex; gap: 5px; align-items: center; flex-shrink: 0; }
.room-join-btn {
  background: rgba(199,179,119,0.15); border: 1px solid #c7b377;
  color: #e0d0a0; padding: 5px 135px; border-radius: 3px;
  cursor: pointer; font-size: 12px; font-weight: bold; transition: all 0.2s;
}
.room-join-btn:hover { background: rgba(199,179,119,0.35); }
.room-delete-btn {
  background: rgba(80,10,10,0.5); border: 1px solid rgba(255,80,80,0.35);
  color: #cc5555; padding: 5px 8px; border-radius: 3px;
  cursor: pointer; font-size: 11px; font-weight: bold; transition: all 0.2s;
  line-height: 1;
}
.room-delete-btn:hover { background: rgba(140,20,20,0.7); border-color: #ff6b6b; color: #ff9999; }

/* ===== 右: 相手情報 ===== */
#msOpponentBox {
  padding: 10px; background: rgba(0,0,0,0.3);
  border: 1px solid rgba(199,179,119,0.12); border-radius: 6px;
  flex-shrink: 0;
}
#opponentRow { display: flex; align-items: center; gap: 8px; margin-top: 6px; }
#opponentDot {
  width: 9px; height: 9px; border-radius: 50%;
  background: #333; flex-shrink: 0; transition: all 0.3s;
}
#opponentDot.online { background: #70c070; box-shadow: 0 0 6px #70c070; }
#opponentDot.ready  { background: #c7b377; box-shadow: 0 0 6px #c7b377; }
#opponentNameEl { font-size: 14px; font-weight: bold; color: #666; }
#opponentNameEl.active { color: #e0d0a0; }
#opponentStatusEl { font-size: 10px; color: #444; margin-top: 2px; }
#opponentStatusEl.ready { color: #70c070; }

/* 相手デッキ表示 */
#msOpponentDeck {
  display: flex; align-items: center; gap: 8px;
  padding: 8px; background: rgba(0,0,0,0.2);
  border: 1px solid #2a2210; border-radius: 5px; margin-top: 8px;
}
#opponentDeckThumb {
  width: 30px; height: 42px; object-fit: cover;
  border-radius: 2px; border: 1px solid #3a321a; flex-shrink: 0;
  opacity: 0.5;
}
#opponentDeckName { font-size: 11px; color: #666; }
#opponentDeckName.active { color: #b0a070; }

/* ===== ポップアップ共通 ===== */
.popup-overlay {
  position: fixed; inset: 0; z-index: 500;
  background: rgba(0,0,0,0.8); backdrop-filter: blur(4px);
  display: flex; align-items: center; justify-content: center;
}
.popup-overlay.hidden { display: none; }
.popup-box {
  background: rgba(14,11,26,0.98); border: 1px solid #c7b377;
  border-radius: 10px; padding: 20px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.9);
  max-width: 92vw; max-height: 90vh;
  display: flex; flex-direction: column; gap: 14px;
}
.popup-title {
  font-size: 16px; font-weight: 700; letter-spacing: 2px; color: #e0d0a0;
  border-bottom: 1px solid rgba(199,179,119,0.25); padding-bottom: 8px;
  flex-shrink: 0;
}
.popup-footer {
  display: flex; justify-content: flex-end; gap: 8px;
  border-top: 1px solid rgba(199,179,119,0.18); padding-top: 10px;
  flex-shrink: 0;
}
.popup-btn {
  padding: 8px 20px; font-size: 13px; font-weight: bold;
  border-radius: 4px; cursor: pointer; transition: all 0.2s;
}
.popup-btn.primary {
  background: linear-gradient(to bottom, #c7b377, #a88e4a);
  color: #1a172c; border: none;
}
.popup-btn.primary:hover { filter: brightness(1.1); }
.popup-btn.secondary {
  background: rgba(199,179,119,0.08); border: 1px solid rgba(199,179,119,0.35);
  color: #e0d0a0;
}
.popup-btn.secondary:hover { background: rgba(199,179,119,0.18); }

/* ===== デッキ選択ポップアップ（左: 一覧 / 右: プレビュー） ===== */
#deckSelectPopup .popup-box {
  width: min(860px, 92vw); height: min(600px, 88vh);
}
#deckSelectInner {
  display: grid; grid-template-columns: 280px 1fr;
  gap: 14px; flex: 1; min-height: 0;
}

/* 左: デッキ一覧 */
#deckSelectList {
  display: flex; flex-direction: column; gap: 6px;
  overflow-y: auto;
  scrollbar-width: thin; scrollbar-color: #3a321a transparent;
}
.deckSelectItem {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 10px; border-radius: 5px;
  border: 1px solid #2a2210; background: rgba(0,0,0,0.3);
  cursor: pointer; transition: all 0.2s; flex-shrink: 0;
}
.deckSelectItem:hover { border-color: #c7b377; background: rgba(199,179,119,0.07); }
.deckSelectItem.selected {
  border-color: #c7b377; background: rgba(199,179,119,0.12);
  box-shadow: 0 0 8px rgba(199,179,119,0.25);
}
.deckSelectItem img {
  width: 32px; height: 45px; object-fit: cover;
  border-radius: 2px; border: 1px solid #3a321a; flex-shrink: 0;
}
.deckSelectItem .dsi-name {
  font-size: 13px; font-weight: bold; color: #c0b080;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.deckSelectItem.selected .dsi-name { color: #e0d0a0; }
.deckSelectItem .dsi-count { font-size: 10px; color: #666; margin-top: 2px; }

/* 右: デッキプレビュー */
#deckPreviewArea {
  display: flex; flex-direction: column; gap: 8px;
  background: rgba(0,0,0,0.2); border: 1px solid rgba(199,179,119,0.1);
  border-radius: 6px; padding: 12px; min-height: 0;
}
#deckPreviewTitle {
  font-size: 13px; font-weight: bold; color: #c7b377;
  flex-shrink: 0;
}
#deckPreviewCards {
  flex: 1; display: flex; flex-wrap: wrap; gap: 6px;
  overflow-y: auto; align-content: flex-start;
  scrollbar-width: thin; scrollbar-color: #3a321a transparent;
}
.pvCard {
  position: relative; width: 58px;
  border: 1px solid #2a2210; border-radius: 3px; overflow: hidden;
  background: #000;
}
.pvCard img { width: 100%; display: block; }
.pvCard .pv-count {
  position: absolute; bottom: 0; right: 0;
  background: rgba(0,0,0,0.85); color: #c7b377;
  font-size: 10px; font-weight: bold; padding: 1px 4px;
  border-top-left-radius: 3px;
}
#deckPreviewEmpty {
  color: #444; font-size: 12px; padding: 20px; text-align: center;
}
</style>
</head>
<body>
<button class="back-btn" onclick="location.href='index.html'">戻る</button>

<div id="msLayout">

  <!-- ===== 左上: 自分エリア ===== -->
  <div id="msLeft">
    <div id="msPlayerName">
      <div class="sec-label">あなた</div>
      <span id="myPlayerDisplay">---</span>
    </div>

    <div id="msCurrentDeck" onclick="openDeckSelectPopup()">
      <img id="msDeckThumb" class="deck-thumb" src="assets/favicon.png" alt="deck">
      <div class="deck-info">
        <div id="msDeckName" class="deck-name">デッキ未選択</div>
        <div id="msDeckCount" class="deck-count">-- 枚</div>
        <div class="deck-hint">▶ クリックでデッキ選択</div>
      </div>
    </div>

    <button id="startBtn" disabled>
      READY
      <span class="btn-sub" id="startBtnSub">ルームに参加してください</span>
    </button>

    <button id="cancelBtn" onclick="leaveRoom()">退室する</button>

    <div id="firebaseStatus">接続中...</div>
  </div>

  <!-- ===== 左下: チャット ===== -->
  <div id="msChat">
    <div class="chat-header">チャット / ログ</div>
    <div id="chatLog"></div>
    <div id="chatInputRow">
      <input id="chatInput" type="text" placeholder="メッセージを入力..." maxlength="100">
      <button id="chatSendBtn">送信</button>
    </div>
  </div>

  <!-- ===== 中央: ルーム ===== -->
  <div id="msCenter">
    <div id="msRoomArea">
      <div class="sec-label">ルーム</div>
      <div id="msRoomInputRow">
        <input id="roomNameInput" type="text" placeholder="ルーム名（空欄で自動生成）" maxlength="20">
      </div>
      <div id="msRoomBtns">
        <button class="msRoomBtn" id="createRoomBtn">ルームを作成</button>
        <button class="msRoomBtn" id="joinRoomBtn">ルーム名で参加</button>
      </div>
    </div>

    <div id="msRoomListWrap">
      <div id="msRoomListHeader">
        <div class="sec-label">公開ルーム一覧</div>
        <span>
          <button id="roomRefreshBtn" type="button">更新</button>
          <span id="roomRefreshCooldown"></span>
        </span>
      </div>
      <div id="roomList">
        <div style="color:#444;font-size:11px;padding:6px;">検索中...</div>
      </div>
    </div>
  </div>

  <!-- ===== 右: 相手情報 ===== -->
  <div id="msRight">
    <div id="msOpponentBox">
      <div class="sec-label">対戦相手</div>
      <div id="opponentRow">
        <div id="opponentDot"></div>
        <div>
          <div id="opponentNameEl">待機中...</div>
          <div id="opponentStatusEl">未接続</div>
        </div>
      </div>
      <div id="msOpponentDeck">
        <img id="opponentDeckThumb" src="assets/favicon.png" alt="">
        <div id="opponentDeckName">デッキ未選択</div>
      </div>
    </div>
  </div>

</div><!-- #msLayout -->

<!-- ===== デッキ選択ポップアップ（一覧 + プレビュー） ===== -->
<div id="deckSelectPopup" class="popup-overlay hidden">
  <div class="popup-box">
    <div class="popup-title">デッキを選択</div>
    <div id="deckSelectInner">
      <!-- 左: 一覧 -->
      <div id="deckSelectList"></div>
      <!-- 右: プレビュー -->
      <div id="deckPreviewArea">
        <div id="deckPreviewTitle">デッキを選択してください</div>
        <div id="deckPreviewCards">
          <div id="deckPreviewEmpty">← デッキをクリックして内容を確認</div>
        </div>
      </div>
    </div>
    <div class="popup-footer">
      <button class="popup-btn secondary" onclick="closeDeckSelectPopup()">閉じる</button>
      <button class="popup-btn primary" onclick="confirmDeckSelect()">確定</button>
    </div>
  </div>
</div>

<select id="deckSelect" style="display:none;"></select>

<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database-compat.js"></script>
<script src="js/firebase-client.js?v=10"></script>
<script src="js/cardData.js?v=11"></script>

<script src="js/deckCode.js?v=11"></script>
<script src="js/matchSetup.js?v=16"></script>
</body>
</html>
