<!DOCTYPE html>
<html lang="ja" translate="no">
<head>
<meta charset="UTF-8">
<meta name="google" content="notranslate">
<title>DepenDrap</title>
<link rel="icon" href="assets/favicon.png">
<link rel="stylesheet" href="css/style.css?v=2">
</head>
<body>

<div id="gameUiEnemy"></div>
<div id="gameUiPlayer">
  <div id="chatArea">
    <div id="chatLogs"></div>
    <div id="chatInputRow">
      <input type="text" id="chatInput" placeholder="メッセージを入力...">
      <button type="button" id="chatSendBtn">送信</button>
    </div>
  </div>
  <div id="gameUiPlayerInner"></div>
</div>

<div id="zoomControls">
  <div id="cameraActionRow">
    <button type="button" class="actionBtn" onclick="focusOnDeck()">Deck</button>
    <button type="button" class="actionBtn" onclick="centerField()">Center</button>
  </div>
  <div id="zoomSliderRow">
    <button type="button" class="zoomBtn" onclick="zoomField(-1)">-</button>
    <input id="zoomSlider" type="range" min="0.2" max="1.0" step="0.01" value="0.3" aria-label="フィールド拡大率">
    <button type="button" class="zoomBtn" onclick="zoomField(1)">+</button>
  </div>
</div>

<!-- Photon SDK（core.js より前に読み込む） -->
<script src="https://cdn.jsdelivr.net/npm/photon-sdk@5.0.0/lib/photon-sdk.js"></script>
<script src="js/photon-sync.js?v=6"></script>

<script src="js/cardData.js?v=6"></script>
<script src="js/deckCode.js?v=6"></script>
<script src="js/core.js?v=6"></script>
<script src="js/timerSync.js?v=6"></script>
<script src="js/cardManager.js?v=6"></script>
<script src="js/game.js?v=6"></script>
<script src="js/menu.js?v=6"></script>
<script src="js/devTools.js?v=1"></script>
<script src="js/damageCalc.js?v=2"></script>

<div id="field">
  <div id="fieldBgBlur"></div>
  <div id="fieldContent">
    <div id="fieldBg"></div>
  </div>
</div>

<script src="js/contextMenu.js?v=6"></script>
<script>
  initCards();

  // ゲーム画面で Photon に接続（matchSetup から引き継ぎ）
  window.myUsername = localStorage.getItem("username") || "Player";
  PhotonSync.init({
    onJoinedRoom: (roomName, role) => {
      console.log("[Game] Photon joined:", roomName, role);
      // ClockSync を Photon.ServerTime に切り替え
      PhotonSync.overrideClockSync();
      document.dispatchEvent(new Event("photonJoined"));
    },
    onOpponentJoined: (actor) => {
      console.log("[Game] Opponent joined:", actor.name);
      // 相手が入室したら自分の全状態を送る（photon-sync.js が自動で送る）
    },
    onOpponentLeft: (actor) => {
      console.log("[Game] Opponent left");
      addGameLog && addGameLog(`[SYSTEM] 対戦相手が切断しました。`);
    },
  });

  // matchSetup で決定したルームに再参加
  const setup = JSON.parse(localStorage.getItem("matchSetup") || "null");
  if (setup && setup.roomName) {
    PhotonSync.joinRoom(setup.roomName);
  }
</script>

</body>
</html>
