<!DOCTYPE html>
<html lang="ja" translate="no">
<head>
<meta charset="UTF-8">
<meta name="google" content="notranslate">
<title>DepenDrap</title>
<link rel="icon" href="assets/favicon.png">
<link rel="stylesheet" href="css/style.css?v=2">

<!-- Firebase Configuration -->
<script>
  window.FIREBASE_CONFIG = {
    apiKey: "AIzaSyDNe58gGvJ3-09brUHkoorkQalrS8jkPAw",
    authDomain: "dependrap-c30b4.firebaseapp.com",
    databaseURL: "https://dependrap-c30b4-default-rtdb.firebaseio.com",
    projectId: "dependrap-c30b4",
    storageBucket: "dependrap-c30b4.firebasestorage.app",
    messagingSenderId: "536531285865",
    appId: "1:536531285865:web:0d53a2c4fd8fae7ff32ff8"
  };
</script>
</head>
<body>

<div id="gameUiEnemy"></div>
<div id="gameUiPlayer">
  <div id="chatArea">
    <div id="chatLogs"></div>
    <div id="chatInputRow">
      <input type="text" id="chatInput" placeholder="メッセージを入力...">
      <button type="button" id="chatSendBtn">送信</button>
    </div>
  </div>
  <div id="gameUiPlayerInner"></div>
</div>

<div id="zoomControls">
  <div id="cameraActionRow">
    <button type="button" class="actionBtn" onclick="focusOnDeck()">Deck</button>
    <button type="button" class="actionBtn" onclick="centerField()">Center</button>
  </div>
  <div id="zoomSliderRow">
    <button type="button" class="zoomBtn" onclick="zoomField(-1)">-</button>
    <input id="zoomSlider" type="range" min="0.2" max="1.0" step="0.01" value="0.3" aria-label="フィールド拡大率">
    <button type="button" class="zoomBtn" onclick="zoomField(1)">+</button>
  </div>
</div>

<!-- Firebase SDK (Compat version for global firebase object) -->
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database-compat.js"></script>
<script src="js/firebase-client.js?v=1"></script>

<script src="js/cardData.js?v=7"></script>
<script src="js/deckCode.js?v=7"></script>
<script src="js/core.js?v=7"></script>
<script src="js/timerSync.js?v=7"></script>
<script src="js/cardManager.js?v=7"></script>
<script src="js/game.js?v=7"></script>
<script src="js/menu.js?v=7"></script>
<script src="js/devTools.js?v=2"></script>
<script src="js/damageCalc.js?v=3"></script>

<div id="field">
  <div id="fieldBgBlur"></div>
  <div id="fieldContent">
    <div id="fieldBg"></div>
  </div>
</div>

<script src="js/contextMenu.js?v=6"></script>
<script>
  initCards();

  // ゲーム画面で Firebase に接続
  let gameRoomName = null;
  let gamePlayerKey = null;

  window.addEventListener("load", async () => {
    console.log("[Game] Firebase 初期化中...");
    
    const success = await firebaseClient.initialize(window.FIREBASE_CONFIG);
    if (success) {
      console.log("[Game] ✅ Firebase 初期化成功");
      
      // matchSetup から ルーム情報を取得
      gameRoomName = localStorage.getItem("gameRoom");
      gamePlayerKey = localStorage.getItem("gamePlayerKey");
      
      if (gameRoomName && gamePlayerKey) {
        console.log("[Game] ルームに再参加:", gameRoomName, "as", gamePlayerKey);
        // ルーム情報は既に localStorage に保存されている
        document.dispatchEvent(new Event("firebaseJoined"));
      }
    } else {
      console.warn("[Game] ⚠️ Firebase 初期化失敗");
    }
  });

  // ページを離れるときにルームから退出
  window.addEventListener("beforeunload", async () => {
    console.log("[Game] ページを離れます");
    
    if (gameRoomName && gamePlayerKey) {
      console.log("[Game] ルームから自動退出:", gameRoomName);
      await firebaseClient.leaveRoom(gameRoomName, gamePlayerKey);
    }
  });
</script>

</body>
</html>
