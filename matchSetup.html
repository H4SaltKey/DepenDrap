<!DOCTYPE html>
<html lang="ja" translate="no">
<head>
<meta charset="UTF-8">
<meta name="google" content="notranslate">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>DepenDrap - 対戦設定</title>
<link rel="icon" href="assets/favicon.png">
<link rel="stylesheet" href="css/style.css?v=2">

<style>
/* ===== リセット・ベース ===== */
*, *::before, *::after { box-sizing: border-box; }
body {
  margin: 0; padding: 0;
  width: 100vw; height: 100vh; overflow: hidden;
  background: radial-gradient(circle at 30% 50%, #1a172c 0%, #08060f 100%);
  color: #e0d0a0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}

/* ===== 戻るボタン ===== */
.back-btn {
  position: fixed; top: 14px; left: 14px; z-index: 200;
  background: rgba(10,8,20,0.8); border: 1px solid #5a4b27;
  color: #b0a070; padding: 6px 14px; border-radius: 4px;
  cursor: pointer; font-size: 13px; transition: all 0.2s;
}
.back-btn:hover { border-color: #c7b377; color: #e0d0a0; }

/* ===== メインレイアウト（横向き3カラム） ===== */
#msLayout {
  display: grid;
  grid-template-columns: 300px 1fr 280px;
  grid-template-rows: 100vh;
  width: 100vw; height: 100vh;
}

/* ===== 左パネル ===== */
#msLeft {
  display: flex; flex-direction: column;
  padding: 60px 16px 16px 16px; gap: 12px;
  border-right: 1px solid rgba(199,179,119,0.15);
  background: rgba(10,8,20,0.5);
  overflow: hidden;
}

/* プレイヤー名 */
#msPlayerName {
  font-size: 20px; font-weight: 700; letter-spacing: 2px;
  color: #e0d0a0; padding: 10px 12px;
  background: rgba(0,0,0,0.3); border: 1px solid #5a4b27;
  border-radius: 6px;
}
#msPlayerName .label {
  font-size: 10px; color: #b0a070; letter-spacing: 1.5px;
  text-transform: uppercase; display: block; margin-bottom: 4px;
}

/* 選択中デッキ表示 */
#msCurrentDeck {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 12px;
  background: rgba(0,0,0,0.3); border: 1px solid #5a4b27;
  border-radius: 6px; cursor: pointer; transition: all 0.2s;
  min-height: 72px;
}
#msCurrentDeck:hover { border-color: #c7b377; background: rgba(199,179,119,0.05); }
#msCurrentDeck .deck-thumb {
  width: 44px; height: 62px; object-fit: cover;
  border-radius: 3px; border: 1px solid #5a4b27; flex-shrink: 0;
}
#msCurrentDeck .deck-info { flex: 1; min-width: 0; }
#msCurrentDeck .deck-name {
  font-size: 14px; font-weight: bold; color: #e0d0a0;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
#msCurrentDeck .deck-count { font-size: 11px; color: #888; margin-top: 3px; }
#msCurrentDeck .deck-hint { font-size: 10px; color: #c7b377; margin-top: 4px; }

/* デッキ選択ボタン */
#msDeckSelectBtn {
  padding: 10px; font-size: 13px; font-weight: bold; letter-spacing: 1px;
  background: rgba(199,179,119,0.1); border: 1px solid rgba(199,179,119,0.4);
  color: #e0d0a0; border-radius: 4px; cursor: pointer; transition: all 0.2s;
}
#msDeckSelectBtn:hover { background: rgba(199,179,119,0.2); border-color: #c7b377; }

/* READY ボタン */
#startBtn {
  flex: 1;
  background: linear-gradient(to bottom, #c7b377, #a88e4a);
  color: #1a172c; border: none; border-radius: 8px;
  font-size: 28px; font-weight: 900; letter-spacing: 4px;
  cursor: pointer; transition: all 0.25s;
  box-shadow: 0 6px 20px rgba(199,179,119,0.35);
  position: relative; overflow: hidden;
  min-height: 80px;
}
#startBtn::after {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(180deg, rgba(255,255,255,0.12) 0%, transparent 60%);
  pointer-events: none;
}
#startBtn:hover:not(:disabled) {
  transform: translateY(-2px);
  box-shadow: 0 10px 28px rgba(199,179,119,0.55);
}
#startBtn:disabled { opacity: 0.4; cursor: not-allowed; box-shadow: none; transform: none; }
#startBtn.isReady {
  background: linear-gradient(to bottom, #70c070, #3a8a3a);
  box-shadow: 0 6px 20px rgba(112,192,112,0.4);
  color: #fff;
}
#startBtn .btn-sub {
  display: block; font-size: 11px; font-weight: 400;
  letter-spacing: 1px; margin-top: 4px; opacity: 0.75;
}

/* 退室ボタン */
#cancelBtn {
  padding: 8px; font-size: 12px; font-weight: bold;
  background: rgba(80,20,20,0.6); border: 1px solid rgba(255,107,107,0.4);
  color: #ff8888; border-radius: 4px; cursor: pointer; transition: all 0.2s;
  display: none;
}
#cancelBtn:hover { background: rgba(120,30,30,0.8); border-color: #ff6b6b; }

/* Firebase 状態 */
#firebaseStatus {
  font-size: 11px; color: #555; letter-spacing: 1px;
  padding: 4px 8px; border-radius: 3px;
  background: rgba(0,0,0,0.2); text-align: center;
}
#firebaseStatus.ok { color: #70c070; }

/* ===== 中央パネル ===== */
#msCenter {
  display: flex; flex-direction: column;
  padding: 16px; gap: 12px; overflow: hidden;
}

/* ルーム操作エリア */
#msRoomArea {
  display: flex; flex-direction: column; gap: 10px;
  padding: 14px; background: rgba(0,0,0,0.3);
  border: 1px solid rgba(199,179,119,0.15); border-radius: 8px;
}
#msRoomArea .section-title {
  font-size: 11px; color: #b0a070; letter-spacing: 1.5px;
  text-transform: uppercase; font-weight: bold;
}
#msRoomInputRow {
  display: flex; gap: 8px;
}
#roomNameInput {
  flex: 1; padding: 9px 12px;
  background: rgba(0,0,0,0.5); border: 1px solid #5a4b27;
  color: #fff; border-radius: 4px; font-size: 14px;
  text-transform: uppercase;
}
#roomNameInput:focus { outline: none; border-color: #c7b377; }
#msRoomBtns { display: flex; gap: 8px; }
.msRoomBtn {
  flex: 1; padding: 9px 8px; font-size: 13px; font-weight: bold;
  border-radius: 4px; cursor: pointer; transition: all 0.2s;
  background: rgba(199,179,119,0.12); border: 1px solid rgba(199,179,119,0.4);
  color: #e0d0a0;
}
.msRoomBtn:hover { background: rgba(199,179,119,0.25); border-color: #c7b377; }

/* ルーム一覧 */
#msRoomListArea {
  flex: 1; display: flex; flex-direction: column; gap: 8px;
  min-height: 0;
}
#msRoomListArea .section-title {
  font-size: 11px; color: #b0a070; letter-spacing: 1.5px;
  text-transform: uppercase; font-weight: bold; flex-shrink: 0;
}
#roomList {
  flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 6px;
  scrollbar-width: thin; scrollbar-color: #5a4b27 transparent;
}
.roomItem {
  display: flex; align-items: center; justify-content: space-between;
  background: rgba(0,0,0,0.35); border: 1px solid #3a321a;
  border-radius: 6px; padding: 9px 12px; cursor: pointer; transition: all 0.2s;
  flex-shrink: 0;
}
.roomItem:hover { border-color: #c7b377; background: rgba(199,179,119,0.08); }
.roomItem .room-name { font-weight: bold; font-size: 13px; letter-spacing: 1px; }
.roomItem .room-players { font-size: 11px; color: #888; }
.room-join-btn {
  background: rgba(199,179,119,0.15); border: 1px solid #c7b377;
  color: #e0d0a0; padding: 4px 12px; border-radius: 3px;
  cursor: pointer; font-size: 11px; font-weight: bold; transition: all 0.2s;
}
.room-join-btn:hover { background: rgba(199,179,119,0.35); }

/* ===== 右パネル ===== */
#msRight {
  display: flex; flex-direction: column;
  padding: 16px; gap: 12px;
  border-left: 1px solid rgba(199,179,119,0.15);
  background: rgba(10,8,20,0.5);
  overflow: hidden;
}

/* 相手情報 */
#msOpponent {
  padding: 12px; background: rgba(0,0,0,0.3);
  border: 1px solid rgba(199,179,119,0.15); border-radius: 8px;
}
#msOpponent .section-title {
  font-size: 10px; color: #b0a070; letter-spacing: 1.5px;
  text-transform: uppercase; font-weight: bold; margin-bottom: 8px;
}
#opponentCard {
  display: flex; align-items: center; gap: 10px;
}
#opponentDot {
  width: 10px; height: 10px; border-radius: 50%;
  background: #444; flex-shrink: 0; transition: all 0.3s;
}
#opponentDot.online { background: #70c070; box-shadow: 0 0 8px #70c070; }
#opponentDot.ready  { background: #c7b377; box-shadow: 0 0 8px #c7b377; }
#opponentName { font-size: 15px; font-weight: bold; color: #888; }
#opponentName.active { color: #e0d0a0; }
#opponentStatus { font-size: 11px; color: #555; margin-top: 2px; }
#opponentStatus.ready { color: #70c070; }

/* チャット */
#msChat {
  flex: 1; display: flex; flex-direction: column; gap: 0;
  background: rgba(0,0,0,0.3); border: 1px solid rgba(199,179,119,0.15);
  border-radius: 8px; overflow: hidden; min-height: 0;
}
#msChat .section-title {
  font-size: 10px; color: #b0a070; letter-spacing: 1.5px;
  text-transform: uppercase; font-weight: bold;
  padding: 8px 12px; border-bottom: 1px solid rgba(199,179,119,0.1);
  flex-shrink: 0;
}
#chatLog {
  flex: 1; overflow-y: auto; padding: 8px 10px;
  display: flex; flex-direction: column; gap: 4px;
  scrollbar-width: thin; scrollbar-color: #5a4b27 transparent;
  min-height: 0;
}
.chatLine {
  font-size: 12px; line-height: 1.4; word-break: break-all;
}
.chatLine.system { color: #888; font-style: italic; }
.chatLine.mine   { color: #c7b377; }
.chatLine.other  { color: #e0d0a0; }
#chatInputRow {
  display: flex; gap: 0; border-top: 1px solid rgba(199,179,119,0.1);
  flex-shrink: 0;
}
#chatInput {
  flex: 1; padding: 8px 10px;
  background: rgba(0,0,0,0.4); border: none;
  color: #e0d0a0; font-size: 13px;
}
#chatInput:focus { outline: none; background: rgba(0,0,0,0.6); }
#chatSendBtn {
  padding: 8px 14px; background: rgba(199,179,119,0.15);
  border: none; border-left: 1px solid rgba(199,179,119,0.2);
  color: #c7b377; cursor: pointer; font-size: 12px; font-weight: bold;
  transition: all 0.2s;
}
#chatSendBtn:hover { background: rgba(199,179,119,0.3); }

/* システムメッセージ */
#setupMsg {
  font-size: 12px; color: #c7b377; text-align: center;
  min-height: 18px; flex-shrink: 0;
}

/* ===== デッキ内容ポップアップ ===== */
.popup-overlay {
  position: fixed; inset: 0; z-index: 500;
  background: rgba(0,0,0,0.75); backdrop-filter: blur(4px);
  display: flex; align-items: center; justify-content: center;
}
.popup-overlay.hidden { display: none; }
.popup-box {
  background: rgba(18,15,30,0.97); border: 1px solid #c7b377;
  border-radius: 10px; padding: 24px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.9);
  max-width: 90vw; max-height: 90vh;
  display: flex; flex-direction: column; gap: 16px;
}
.popup-title {
  font-size: 18px; font-weight: 700; letter-spacing: 2px; color: #e0d0a0;
  border-bottom: 1px solid rgba(199,179,119,0.3); padding-bottom: 10px;
}
.popup-footer {
  display: flex; justify-content: flex-end; gap: 10px;
  border-top: 1px solid rgba(199,179,119,0.2); padding-top: 12px;
}
.popup-btn {
  padding: 9px 24px; font-size: 14px; font-weight: bold;
  border-radius: 4px; cursor: pointer; transition: all 0.2s;
}
.popup-btn.primary {
  background: linear-gradient(to bottom, #c7b377, #a88e4a);
  color: #1a172c; border: none;
}
.popup-btn.primary:hover { filter: brightness(1.1); }
.popup-btn.secondary {
  background: rgba(199,179,119,0.1); border: 1px solid rgba(199,179,119,0.4);
  color: #e0d0a0;
}
.popup-btn.secondary:hover { background: rgba(199,179,119,0.2); }

/* ===== デッキ内容表示 ===== */
#deckViewPopup .popup-box { width: 600px; }
#deckViewCards {
  display: flex; flex-wrap: wrap; gap: 8px;
  overflow-y: auto; max-height: 55vh;
  scrollbar-width: thin; scrollbar-color: #5a4b27 transparent;
}
.deckViewCard {
  position: relative; width: 70px;
  border: 1px solid #3a321a; border-radius: 4px; overflow: hidden;
  background: #000; cursor: default;
}
.deckViewCard img { width: 100%; display: block; }
.deckViewCard .card-count {
  position: absolute; bottom: 0; right: 0;
  background: rgba(0,0,0,0.85); color: #c7b377;
  font-size: 12px; font-weight: bold; padding: 2px 5px;
  border-top-left-radius: 4px;
}

/* ===== デッキ選択ポップアップ ===== */
#deckSelectPopup .popup-box { width: 700px; }
#deckSelectList {
  display: flex; flex-wrap: wrap; gap: 12px;
  overflow-y: auto; max-height: 55vh;
  scrollbar-width: thin; scrollbar-color: #5a4b27 transparent;
}
.deckSelectCard {
  width: 110px; cursor: pointer; border-radius: 6px;
  border: 2px solid #3a321a; overflow: hidden;
  background: #000; transition: all 0.2s; position: relative;
}
.deckSelectCard:hover { border-color: #c7b377; transform: translateY(-3px); }
.deckSelectCard.selected {
  border-color: #c7b377; box-shadow: 0 0 14px rgba(199,179,119,0.6);
  transform: translateY(-3px);
}
.deckSelectCard img { width: 100%; aspect-ratio: 210/297; object-fit: cover; opacity: 0.75; }
.deckSelectCard.selected img { opacity: 1; }
.deckSelectCard .ds-name {
  padding: 4px 5px; font-size: 10px; text-align: center;
  color: #e0d0a0; background: rgba(0,0,0,0.8);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.deckSelectCard .ds-view-btn {
  position: absolute; top: 4px; right: 4px;
  background: rgba(0,0,0,0.7); border: 1px solid #5a4b27;
  color: #b0a070; font-size: 10px; padding: 2px 5px;
  border-radius: 3px; cursor: pointer; transition: all 0.2s;
}
.deckSelectCard .ds-view-btn:hover { border-color: #c7b377; color: #e0d0a0; }
</style>
</head>
<body>
<button class="back-btn" onclick="location.href='index.html'">← 戻る</button>

<!-- ===== メインレイアウト ===== -->
<div id="msLayout">

  <!-- 左パネル: 自分の情報 + READY -->
  <div id="msLeft">
    <div id="msPlayerName">
      <span class="label">あなた</span>
      <span id="myPlayerDisplay">---</span>
    </div>

    <!-- 選択中デッキ -->
    <div id="msCurrentDeck" onclick="openDeckView(selectedDeckId)">
      <img id="msDeckThumb" class="deck-thumb" src="assets/favicon.png" alt="deck">
      <div class="deck-info">
        <div id="msDeckName" class="deck-name">デッキ未選択</div>
        <div id="msDeckCount" class="deck-count">-- 枚</div>
        <div class="deck-hint">クリックでデッキ内容を確認</div>
      </div>
    </div>

    <!-- デッキ選択ボタン -->
    <button id="msDeckSelectBtn" onclick="openDeckSelectPopup()">デッキを選択</button>

    <!-- READY ボタン -->
    <button id="startBtn" disabled>
      READY
      <span class="btn-sub" id="startBtnSub">ルームに参加してください</span>
    </button>

    <!-- 退室ボタン -->
    <button id="cancelBtn" onclick="leaveRoom()">退室する</button>

    <!-- Firebase 状態 -->
    <div id="firebaseStatus">接続中...</div>
    <div id="setupMsg"></div>
  </div>

  <!-- 中央パネル: ルーム操作 + ルーム一覧 -->
  <div id="msCenter">
    <!-- ルーム操作 -->
    <div id="msRoomArea">
      <div class="section-title">ルーム</div>
      <div id="msRoomInputRow">
        <input id="roomNameInput" type="text" placeholder="ルーム名（空欄で自動生成）" maxlength="20">
      </div>
      <div id="msRoomBtns">
        <button class="msRoomBtn" id="createRoomBtn">ルームを作成</button>
        <button class="msRoomBtn" id="joinRoomBtn">ルーム名で参加</button>
      </div>
    </div>

    <!-- ルーム一覧 -->
    <div id="msRoomListArea" style="flex:1; display:flex; flex-direction:column; gap:8px; min-height:0;">
      <div class="section-title">公開ルーム一覧</div>
      <div id="roomList">
        <div style="color:#555;font-size:12px;padding:8px;">検索中...</div>
      </div>
    </div>
  </div>

  <!-- 右パネル: 相手情報 + チャット -->
  <div id="msRight">
    <!-- 相手情報 -->
    <div id="msOpponent">
      <div class="section-title">対戦相手</div>
      <div id="opponentCard">
        <div id="opponentDot"></div>
        <div>
          <div id="opponentName">待機中...</div>
          <div id="opponentStatus">未接続</div>
        </div>
      </div>
    </div>

    <!-- チャット -->
    <div id="msChat">
      <div class="section-title">チャット / ログ</div>
      <div id="chatLog"></div>
      <div id="chatInputRow">
        <input id="chatInput" type="text" placeholder="メッセージを入力..." maxlength="100">
        <button id="chatSendBtn">送信</button>
      </div>
    </div>
  </div>
</div>

<!-- ===== デッキ内容ポップアップ ===== -->
<div id="deckViewPopup" class="popup-overlay hidden">
  <div class="popup-box">
    <div class="popup-title" id="deckViewTitle">デッキ内容</div>
    <div id="deckViewCards"></div>
    <div class="popup-footer">
      <button class="popup-btn secondary" onclick="closeDeckView()">閉じる</button>
    </div>
  </div>
</div>

<!-- ===== デッキ選択ポップアップ ===== -->
<div id="deckSelectPopup" class="popup-overlay hidden">
  <div class="popup-box">
    <div class="popup-title">デッキを選択</div>
    <div id="deckSelectList"></div>
    <div class="popup-footer">
      <button class="popup-btn secondary" onclick="closeDeckSelectPopup()">閉じる</button>
      <button class="popup-btn primary" id="deckConfirmBtn" onclick="confirmDeckSelect()">確定</button>
    </div>
  </div>
</div>

<!-- hidden select for compatibility -->
<select id="deckSelect" style="display:none;"></select>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database-compat.js"></script>
<script src="js/firebase-client.js?v=6"></script>
<script src="js/cardData.js?v=11"></script>
<script src="js/deckCode.js?v=11"></script>
<script src="js/matchSetup.js?v=17"></script>
</body>
</html>
