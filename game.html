<!DOCTYPE html>
<html lang="ja" translate="no">
<head>
<meta charset="UTF-8">
<meta name="google" content="notranslate">
<title>DepenDrap</title>
<link rel="icon" href="assets/favicon.png">
<link rel="stylesheet" href="css/style.css?v=2">

<!-- Firebase Configuration -->
<script>
  window.FIREBASE_CONFIG = {
    apiKey: "YOUR_API_KEY",
    authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
    databaseURL: "https://<project-id>-default-rtdb.asia-northeast1.firebasedatabase.app",
    projectId: "YOUR_PROJECT_ID",
    storageBucket: "YOUR_PROJECT_ID.appspot.com",
    messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
    appId: "YOUR_APP_ID"
  };
</script>
</head>
<body>

<div id="gameUiEnemy"></div>
<div id="gameUiPlayer">
  <div id="chatArea">
    <div id="chatLogs"></div>
    <div id="chatInputRow">
      <input type="text" id="chatInput" placeholder="メッセージを入力...">
      <button type="button" id="chatSendBtn">送信</button>
    </div>
  </div>
  <div id="gameUiPlayerInner"></div>
</div>

<div id="zoomControls">
  <div id="cameraActionRow">
    <button type="button" class="actionBtn" onclick="focusOnDeck()">Deck</button>
    <button type="button" class="actionBtn" onclick="centerField()">Center</button>
  </div>
  <div id="zoomSliderRow">
    <button type="button" class="zoomBtn" onclick="zoomField(-1)">-</button>
    <input id="zoomSlider" type="range" min="0.2" max="1.0" step="0.01" value="0.3" aria-label="フィールド拡大率">
    <button type="button" class="zoomBtn" onclick="zoomField(1)">+</button>
  </div>
</div>

<!-- Firebase SDK (Compat version for global firebase object) -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="js/firebase-sync.js?v=2"></script>

<script src="js/cardData.js?v=7"></script>
<script src="js/deckCode.js?v=7"></script>
<script src="js/core.js?v=7"></script>
<script src="js/timerSync.js?v=7"></script>
<script src="js/cardManager.js?v=7"></script>
<script src="js/game.js?v=7"></script>
<script src="js/menu.js?v=7"></script>
<script src="js/devTools.js?v=2"></script>
<script src="js/damageCalc.js?v=3"></script>

<div id="field">
  <div id="fieldBgBlur"></div>
  <div id="fieldContent">
    <div id="fieldBg"></div>
  </div>
</div>

<script src="js/contextMenu.js?v=6"></script>
<script>
  initCards();

  // ゲーム画面で Firebase に接続（matchSetup から引き継ぎ）
  window.myUsername = localStorage.getItem("username") || "Player";
  FirebaseSync.init({
    onJoinedRoom: (roomName, role) => {
      console.log("[Game] Firebase joined:", roomName, role);
      document.dispatchEvent(new Event("firebaseJoined"));
    },
    onOpponentJoined: (actor) => {
      console.log("[Game] Opponent joined:", actor.name);
    },
    onOpponentLeft: (actor) => {
      console.log("[Game] Opponent left");
      addGameLog && addGameLog(`[SYSTEM] 対戦相手が切断しました。`);
    }
  });

  // matchSetup で決定したルームに再参加
  const setup = JSON.parse(localStorage.getItem("matchSetup") || "null");
  if (setup && setup.roomName) {
    FirebaseSync.joinRoom(setup.roomName);
  }
</script>

</body>
</html>
