<!DOCTYPE html>
<html lang="ja" translate="no">
<head>
  <meta charset="UTF-8">
  <meta name="google" content="notranslate">
  <title>DepenDrap Online - Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <link rel="icon" href="assets/favicon.png">
  <link rel="stylesheet" href="css/style.css">
  
  <!-- Firebase Configuration -->
  <script>
    window.FIREBASE_CONFIG = {
      apiKey: "AIzaSyDNe58gGvJ3-09brUHkoorkQalrS8jkPAw",
      authDomain: "dependrap-c30b4.firebaseapp.com",
      databaseURL: "https://dependrap-c30b4-default-rtdb.asia-northeast1.firebasedatabase.app",
      projectId: "dependrap-c30b4",
      storageBucket: "dependrap-c30b4.firebasestorage.app",
      messagingSenderId: "536531285865",
      appId: "1:536531285865:web:0d53a2c4fd8fae7ff32ff8"
    };
  </script>

  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background: radial-gradient(circle at center, #1a172c 0%, #08060f 100%);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      overflow: hidden;
      margin: 0;
    }

    .login-container {
      background: rgba(20, 18, 32, 0.9);
      border: 1px solid #c7b377;
      border-radius: 8px;
      padding: 40px;
      width: 100%;
      max-width: 360px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.8), inset 0 0 10px rgba(199,179,119,0.2);
      text-align: center;
      color: #e0d0a0;
    }

    .login-container h1 {
      margin-top: 0;
      font-size: 28px;
      font-weight: 300;
      letter-spacing: 4px;
      border-bottom: 1px solid rgba(199,179,119,0.3);
      padding-bottom: 15px;
      margin-bottom: 25px;
    }

    .login-subtitle {
      font-size: 12px;
      color: #888;
      margin-bottom: 24px;
      letter-spacing: 1px;
    }

    .input-group {
      margin-bottom: 20px;
      text-align: left;
    }

    .input-group label {
      display: block;
      font-size: 12px;
      margin-bottom: 5px;
      color: #b0a070;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .input-group input {
      width: 100%;
      padding: 12px;
      background: rgba(0,0,0,0.5);
      border: 1px solid #5a4b27;
      color: white;
      border-radius: 4px;
      box-sizing: border-box;
      font-size: 16px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .input-group input:focus {
      outline: none;
      border-color: #c7b377;
      box-shadow: 0 0 5px rgba(199,179,119,0.4);
    }

    .input-group input::placeholder {
      color: #666;
    }

    .error-msg {
      color: #ff6b6b;
      font-size: 13px;
      min-height: 20px;
      margin-bottom: 15px;
    }

    .success-msg {
      color: #70c070;
      font-size: 13px;
      min-height: 20px;
      margin-bottom: 15px;
    }

    .button-group {
      display: flex;
      gap: 10px;
      margin-top: 20px;
    }

    .lorBtn {
      flex: 1;
      padding: 14px;
      font-size: 14px;
      font-weight: bold;
      letter-spacing: 1px;
      justify-content: center;
      cursor: pointer;
      border-radius: 4px;
      background: linear-gradient(to bottom, #c7b377, #a88e4a);
      color: #1a172c;
      border: none;
      transition: all 0.2s;
    }

    .lorBtn:hover {
      filter: brightness(1.1);
    }

    .lorBtn:disabled {
      opacity: 0.5;
      cursor: wait;
    }

    .lorBtn.secondary {
      background: rgba(199,179,119,0.15);
      border: 1px solid rgba(199,179,119,0.5);
      color: #e0d0a0;
    }

    .lorBtn.secondary:hover {
      background: rgba(199,179,119,0.3);
    }

    .mode-toggle {
      text-align: center;
      margin-top: 15px;
      font-size: 12px;
      color: #888;
    }

    .mode-toggle button {
      background: none;
      border: none;
      color: #c7b377;
      cursor: pointer;
      text-decoration: underline;
      font-size: 12px;
    }

    .mode-toggle button:hover {
      color: #e0d0a0;
    }
  </style>
</head>
<body>

<div class="login-container">
  <h1>DepenDrap</h1>
  <p class="login-subtitle" id="modeTitle">LOGIN</p>

  <div class="error-msg" id="errorMsg"></div>
  <div class="success-msg" id="successMsg"></div>

  <div class="input-group">
    <label for="nickname">Nickname</label>
    <input type="text" id="nickname" autocomplete="off" spellcheck="false"
           placeholder="ニックネームを入力" maxlength="20">
  </div>

  <div class="input-group">
    <label for="password">Password</label>
    <input type="password" id="password" autocomplete="off" spellcheck="false"
           placeholder="パスワードを入力" maxlength="20">
  </div>

  <div class="button-group">
    <button class="lorBtn" id="submitBtn">LOGIN</button>
    <button class="lorBtn secondary" id="toggleBtn">REGISTER</button>
  </div>

  <div class="mode-toggle">
    <p id="toggleText">アカウントをお持ちでない場合は「REGISTER」をクリック</p>
  </div>
</div>

<!-- Firebase SDK (Compat version) -->
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database-compat.js"></script>

<!-- Firebase Client -->
<script src="js/firebase-client.js?v=1"></script>

<script>
  const firebaseConfig = window.FIREBASE_CONFIG;
  let db = null;
  let isLoginMode = true;

  // UI 要素
  const nicknameInput = document.getElementById("nickname");
  const passwordInput = document.getElementById("password");
  const submitBtn = document.getElementById("submitBtn");
  const toggleBtn = document.getElementById("toggleBtn");
  const errorMsg = document.getElementById("errorMsg");
  const successMsg = document.getElementById("successMsg");
  const modeTitle = document.getElementById("modeTitle");
  const toggleText = document.getElementById("toggleText");

  // 既にログイン済みなら index へ
  const saved = localStorage.getItem("username");
  if (saved && localStorage.getItem("isOnline") === "true") {
    window.location.href = "index.html";
  }

  /**
   * Firebase を初期化
   */
  async function initializeFirebase() {
    console.log("[Login] Firebase 初期化中...");
    
    const success = await firebaseClient.initialize(firebaseConfig);
    
    if (success) {
      db = firebaseClient.db;
      console.log("[Login] ✅ Firebase 初期化成功");
      console.log("[Login] Project ID:", firebaseConfig.projectId);
    } else {
      console.error("[Login] ❌ Firebase 初期化失敗");
    }
  }

  /**
   * メッセージをクリア
   */
  function clearMessages() {
    errorMsg.textContent = "";
    successMsg.textContent = "";
  }

  /**
   * モードを切り替え
   */
  function toggleMode() {
    isLoginMode = !isLoginMode;
    clearMessages();
    
    if (isLoginMode) {
      modeTitle.textContent = "LOGIN";
      submitBtn.textContent = "LOGIN";
      toggleBtn.textContent = "REGISTER";
      toggleText.textContent = "アカウントをお持ちでない場合は「REGISTER」をクリック";
      passwordInput.placeholder = "パスワードを入力";
    } else {
      modeTitle.textContent = "REGISTER";
      submitBtn.textContent = "CREATE ACCOUNT";
      toggleBtn.textContent = "LOGIN";
      toggleText.textContent = "既にアカウントをお持ちの場合は「LOGIN」をクリック";
      passwordInput.placeholder = "新しいパスワードを入力";
    }
  }

  /**
   * ログイン処理
   */
  async function doLogin() {
    clearMessages();
    const nickname = nicknameInput.value.trim();
    const password = passwordInput.value.trim();

    // バリデーション
    if (!nickname) {
      errorMsg.textContent = "ニックネームを入力してください。";
      return;
    }

    if (!password) {
      errorMsg.textContent = "パスワードを入力してください。";
      return;
    }

    if (nickname.length < 2) {
      errorMsg.textContent = "ニックネームは2文字以上で入力してください。";
      return;
    }

    if (password.length < 4) {
      errorMsg.textContent = "パスワードは4文字以上で入力してください。";
      return;
    }

    // Firebase が初期化されていない場合
    if (!db) {
      console.warn("[Login] Firebase が初期化されていません。ローカルストレージを使用します。");
      
      const accountsJson = localStorage.getItem("accounts");
      const accounts = accountsJson ? JSON.parse(accountsJson) : {};
      
      if (!accounts[nickname]) {
        errorMsg.textContent = "アカウントが見つかりません。";
        return;
      }

      const accountData = accounts[nickname];
      
      if (accountData.password !== password) {
        errorMsg.textContent = "パスワードが間違っています。";
        return;
      }

      // ログイン成功
      localStorage.setItem("username", nickname);
      localStorage.setItem("isOnline", "true");
      localStorage.setItem("accountId", accountData.id);
      
      console.log("[Login] ✅ ログイン成功（ローカル）:", nickname);
      window.location.href = "index.html";
      return;
    }

    // Firebase でログイン
    try {
      const accountRef = db.ref(`accounts/${nickname}`);
      const snapshot = await accountRef.once('value');

      if (!snapshot.exists()) {
        errorMsg.textContent = "アカウントが見つかりません。";
        return;
      }

      const accountData = snapshot.val();
      
      if (accountData.password !== password) {
        errorMsg.textContent = "パスワードが間違っています。";
        return;
      }

      // ログイン成功
      localStorage.setItem("username", nickname);
      localStorage.setItem("isOnline", "true");
      localStorage.setItem("accountId", accountData.id);
      
      console.log("[Login] ✅ ログイン成功:", nickname);
      window.location.href = "index.html";
    } catch (error) {
      console.error("[Login] ログインエラー:", error.message);
      errorMsg.textContent = "ログイン処理中にエラーが発生しました。";
    }
  }

  /**
   * アカウント作成処理
   */
  async function doRegister() {
    clearMessages();
    const nickname = nicknameInput.value.trim();
    const password = passwordInput.value.trim();

    // バリデーション
    if (!nickname) {
      errorMsg.textContent = "ニックネームを入力してください。";
      return;
    }

    if (!password) {
      errorMsg.textContent = "パスワードを入力してください。";
      return;
    }

    if (nickname.length < 2) {
      errorMsg.textContent = "ニックネームは2文字以上で入力してください。";
      return;
    }

    if (password.length < 4) {
      errorMsg.textContent = "パスワードは4文字以上で入力してください。";
      return;
    }

    // Firebase が初期化されていない場合
    if (!db) {
      console.warn("[Login] Firebase が初期化されていません。ローカルストレージを使用します。");
      
      const accountsJson = localStorage.getItem("accounts");
      const accounts = accountsJson ? JSON.parse(accountsJson) : {};
      
      if (accounts[nickname]) {
        const existingAccount = accounts[nickname];
        
        if (existingAccount.password === password) {
          errorMsg.textContent = "このニックネーム + パスワードの組み合わせは既に使用されています。";
          return;
        }
      }

      // 新規アカウントを作成
      const accountId = Math.random().toString(36).substr(2, 9);
      const accountData = {
        id: accountId,
        nickname: nickname,
        password: password,
        createdAt: Date.now(),
        lastLogin: Date.now()
      };

      accounts[nickname] = accountData;
      localStorage.setItem("accounts", JSON.stringify(accounts));

      // ログイン状態に設定
      localStorage.setItem("username", nickname);
      localStorage.setItem("isOnline", "true");
      localStorage.setItem("accountId", accountId);

      successMsg.textContent = "アカウントを作成しました。ゲームを開始します...";
      console.log("[Login] ✅ アカウント作成成功（ローカル）:", nickname);
      
      setTimeout(() => {
        window.location.href = "index.html";
      }, 1000);
      return;
    }

    // Firebase でアカウント作成
    try {
      const accountRef = db.ref(`accounts/${nickname}`);
      const snapshot = await accountRef.once('value');

      if (snapshot.exists()) {
        const existingAccount = snapshot.val();
        
        if (existingAccount.password === password) {
          errorMsg.textContent = "このニックネーム + パスワードの組み合わせは既に使用されています。";
          return;
        }
      }

      // 新規アカウントを作成
      const accountId = Math.random().toString(36).substr(2, 9);
      const accountData = {
        id: accountId,
        nickname: nickname,
        password: password,
        createdAt: firebase.database.ServerValue.TIMESTAMP,
        lastLogin: firebase.database.ServerValue.TIMESTAMP
      };

      await accountRef.set(accountData);

      // ログイン状態に設定
      localStorage.setItem("username", nickname);
      localStorage.setItem("isOnline", "true");
      localStorage.setItem("accountId", accountId);

      successMsg.textContent = "アカウントを作成しました。ゲームを開始します...";
      console.log("[Login] ✅ アカウント作成成功:", nickname);
      
      setTimeout(() => {
        window.location.href = "index.html";
      }, 1000);
    } catch (error) {
      console.error("[Login] アカウント作成エラー:", error.message);
      errorMsg.textContent = "アカウント作成中にエラーが発生しました。";
    }
  }

  /**
   * フォーム送信
   */
  function handleSubmit() {
    if (isLoginMode) {
      doLogin();
    } else {
      doRegister();
    }
  }

  // イベントリスナー
  submitBtn.addEventListener("click", handleSubmit);
  toggleBtn.addEventListener("click", toggleMode);
  
  nicknameInput.addEventListener("keydown", (e) => {
    if (e.key === "Enter") handleSubmit();
  });
  
  passwordInput.addEventListener("keydown", (e) => {
    if (e.key === "Enter") handleSubmit();
  });

  // 初期化
  window.addEventListener("load", () => {
    initializeFirebase();
  });
</script>

</body>
</html>
