<!DOCTYPE html>
<html lang="ja" translate="no">
<head>
  <meta charset="UTF-8">
  <meta name="google" content="notranslate">
  <title>DepenDrap Online - Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <link rel="stylesheet" href="css/style.css">
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background: radial-gradient(circle at center, #1a172c 0%, #08060f 100%);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      overflow: hidden;
    }
    .login-container {
      background: rgba(20, 18, 32, 0.9);
      border: 1px solid #c7b377;
      border-radius: 8px;
      padding: 40px;
      width: 100%;
      max-width: 360px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.8), inset 0 0 10px rgba(199,179,119,0.2);
      text-align: center;
      color: #e0d0a0;
    }
    .login-container h1 {
      margin-top: 0;
      font-size: 28px;
      font-weight: 300;
      letter-spacing: 4px;
      border-bottom: 1px solid rgba(199,179,119,0.3);
      padding-bottom: 15px;
      margin-bottom: 25px;
    }
    .login-subtitle {
      font-size: 12px;
      color: #888;
      margin-bottom: 24px;
      letter-spacing: 1px;
    }
    .input-group {
      margin-bottom: 20px;
      text-align: left;
    }
    .input-group label {
      display: block;
      font-size: 12px;
      margin-bottom: 5px;
      color: #b0a070;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .input-group input {
      width: 100%;
      padding: 12px;
      background: rgba(0,0,0,0.5);
      border: 1px solid #5a4b27;
      color: white;
      border-radius: 4px;
      box-sizing: border-box;
      font-size: 16px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .input-group input:focus {
      outline: none;
      border-color: #c7b377;
      box-shadow: 0 0 5px rgba(199,179,119,0.4);
    }
    .error-msg {
      color: #ff6b6b;
      font-size: 13px;
      min-height: 20px;
      margin-bottom: 15px;
    }
    .lorBtn {
      width: 100%;
      padding: 14px;
      font-size: 16px;
      font-weight: bold;
      letter-spacing: 2px;
      justify-content: center;
      cursor: pointer;
      border-radius: 4px;
      background: linear-gradient(to bottom, #c7b377, #a88e4a);
      color: #1a172c;
      border: none;
      transition: all 0.2s;
    }
    .lorBtn:hover { filter: brightness(1.1); }
    .lorBtn:disabled { opacity: 0.5; cursor: wait; }
  </style>
</head>
<body>

<div class="login-container">
  <h1>DepenDrap</h1>
  <p class="login-subtitle">ENTER YOUR PLAYER NAME</p>

  <div class="error-msg" id="errorMsg"></div>

  <div class="input-group">
    <label for="username">Player Name</label>
    <input type="text" id="username" autocomplete="off" spellcheck="false"
           placeholder="例: Naoki" maxlength="20">
  </div>

  <button class="lorBtn" id="submitBtn">ENTER ARENA</button>
</div>

<script>
  // 既にログイン済みなら index へ
  const saved = localStorage.getItem("username");
  if (saved) window.location.href = "index.html";

  const userIn   = document.getElementById("username");
  const submitBtn = document.getElementById("submitBtn");
  const errorMsg  = document.getElementById("errorMsg");

  function doLogin() {
    const name = userIn.value.trim();
    if (!name) { errorMsg.textContent = "プレイヤー名を入力してください。"; return; }
    if (name.length < 2) { errorMsg.textContent = "2文字以上で入力してください。"; return; }
    localStorage.setItem("username", name);
    window.location.href = "index.html";
  }

  submitBtn.addEventListener("click", doLogin);
  userIn.addEventListener("keydown", e => { if (e.key === "Enter") doLogin(); });
</script>

</body>
</html>
