<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>DepenDrap</title>
<link rel="icon" href="assets/favicon.png">
<link rel="stylesheet" href="css/style.css">
</head>
<body class="deckPage">
<button class="back-btn" onclick="location.href='deckSelect.html'">保存して戻る</button>

<main class="deckBuilder">
  <header style="display:flex;align-items:center;gap:14px;padding-left:140px;">
    <h2 style="margin:0;">デッキ構築</h2>
    <span id="deckTitle" style="font-size:15px;color:#555;"></span>
  </header>

  <section class="deckSection cardCatalog">
    <header>
      <h3>カード一覧</h3>
      <div id="deckMessage"></div>
    </header>
    <div class="pagedRow">
      <button class="pageButton" id="cardsPrev" type="button">‹</button>
      <div id="cards" class="cardRow"></div>
      <button class="pageButton" id="cardsNext" type="button">›</button>
    </div>
  </section>

  <section class="deckSection deckArea" id="deckDropZone">
    <header>
      <h3>デッキ</h3>
      <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;">
        <span style="font-size:13px;">デッキコード: <span id="deckCode"></span></span>
        <button id="btnLoadCode" style="font-size:12px;padding:3px 10px;cursor:pointer;">コードから読み込み</button>
        <div style="display:flex;align-items:center;gap:6px;">
          <span style="font-size:12px;color:#555;">裏面画像:</span>
          <div id="backImagePreview" style="
            width:28px;height:40px;border:1px solid #aaa;background:#eee;
            overflow:hidden;display:flex;align-items:center;justify-content:center;
            font-size:9px;color:#aaa;cursor:pointer;flex-shrink:0;" title="クリックして画像を選択">
            <img id="backImagePreviewImg" src="" alt="" style="width:100%;height:100%;object-fit:cover;display:none;">
            <span id="backImagePreviewNone">なし</span>
          </div>
          <button id="btnSetBackImage" style="font-size:12px;padding:3px 8px;cursor:pointer;">選択</button>
          <button id="btnClearBackImage" style="font-size:12px;padding:3px 8px;cursor:pointer;color:#c00;">✕</button>
          <input type="file" id="backImageInput" accept="image/*" style="display:none;">
        </div>
      </div>
    </header>
    <div id="codeImportRow" class="hidden" style="gap:6px;align-items:center;padding:4px 0;">
      <input type="text" id="codeImportInput" placeholder="デッキコードを入力" style="flex:1;font-size:13px;padding:4px 6px;border:1px solid #aaa;">
      <button id="codeImportConfirm" style="padding:4px 12px;font-size:13px;background:#2f80ed;color:white;border:none;border-radius:3px;cursor:pointer;">適用</button>
      <button id="codeImportCancel" style="padding:4px 10px;font-size:13px;cursor:pointer;">✕</button>
    </div>
    <div id="codeImportError" style="font-size:12px;color:#c00;min-height:14px;padding:0 2px;"></div>
    <div class="pagedRow">
      <button class="pageButton" id="deckPrev" type="button">‹</button>
      <div id="deck" class="cardRow cardRowDeck"></div>
      <button class="pageButton" id="deckNext" type="button">›</button>
    </div>
  </section>
</main>

<script src="js/cardData.js"></script>
<script src="js/deckCode.js"></script>
<script src="js/deck.js"></script>
<script src="js/menu.js?v=5"></script>

</body>
</html>
